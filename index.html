<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Connect Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <style>
        :root {
            --bg-work: #0f172a; --bg-break: #064e3b; --bg-long: #1e3a8a;
            --accent: #38bdf8; --text: #f8fafc; --nav-bg: rgba(0,0,0,0.6);
        }
        body {
            margin: 0; display: flex; flex-direction: column; height: 100vh; 
            background-color: var(--bg-work); color: var(--text);
            font-family: -apple-system, sans-serif; transition: background-color 0.8s; 
            overflow-x: hidden;
        }
        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: var(--nav-bg); backdrop-filter: blur(10px);
            z-index: 100;
        }
        .nav-links button {
            background: none; border: none; color: white; cursor: pointer;
            margin-left: 15px; font-size: 0.9rem; opacity: 0.7; transition: 0.2s;
        }
        .nav-links button:hover, .nav-links button.active { opacity: 1; color: var(--accent); }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-icon { width: 32px; height: 32px; border-radius: 50%; background: #ccc; object-fit: cover;}

        /* Views */
        .view { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .view.active { display: flex; }

        /* Login View */
        #view-login { flex-direction: column; align-items: center; justify-content: center; }
        .auth-card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 12px; text-align: center; width: 100%; max-width: 320px;}
        .auth-input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; border-radius: 6px; border: none;}
        .auth-btn { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-google { background: white; color: #333; }
        .btn-email { background: var(--accent); color: black; }

        /* Main View (Timer & Ranking) */
        #view-main { flex-direction: row; padding: 0; }
        #timer-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;}
        #ranking-section { width: 300px; background: rgba(0,0,0,0.3); border-left: 1px solid rgba(255,255,255,0.1); padding: 20px; display: flex; flex-direction: column;}
        @media (max-width: 768px) { #view-main { flex-direction: column; } #ranking-section { width: auto; border-left: none; border-top: 1px solid rgba(255,255,255,0.1); } }

        /* Timer UI */
        #status-label { letter-spacing: 0.3rem; opacity: 0.7; margin-bottom: 20px; text-transform: uppercase; font-size: 1.2rem;}
        .session-dots { display: flex; gap: 8px; margin-bottom: 1rem; }
        .dot-wrapper { padding: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .dot { width: 16px; height: 16px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: 0.4s; pointer-events: none; }
        .dot.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        #timer { font-size: clamp(4rem, 15vw, 10rem); font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; margin: 0; }
        
        /* Seek Bar */
        .progress-container { width: 80%; max-width: 500px; margin: 2rem 0; }
        input[type="range"] { width: 100%; -webkit-appearance: none; background: rgba(255,255,255,0.2); height: 8px; border-radius: 4px; outline: none; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: white; border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        
        .controls { display: flex; gap: 1.5rem; }
        .main-btn { padding: 1rem 2rem; font-size: 1.1rem; border-radius: 50px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; cursor: pointer; transition: 0.2s; font-weight: bold; }
        #start-btn { background: var(--text); color: #000; min-width: 150px; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .modal-content { text-align: center; }
        .modal-btn { background: var(--accent); color: black; border: none; padding: 15px 30px; margin: 10px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; font-weight: bold;}

        /* Settings & History */
        .settings-card { max-width: 500px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 12px; width: 100%;}
        .settings-group { margin-bottom: 20px; }
        .settings-group label { display: block; margin-bottom: 8px; opacity: 0.8; }
        #calendar { max-width: 800px; margin: 0 auto; width: 100%; background: white; color: black; padding: 10px; border-radius: 8px;}

        /* Ranking Tabs */
        .tab-container { display: flex; gap: 4px; background: rgba(255,255,255,0.1); padding: 4px; border-radius: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; border: none; background: none; color: white; padding: 8px 0; font-size: 0.8rem; cursor: pointer; border-radius: 6px; opacity: 0.5; }
        .tab-btn.active { background: var(--accent); color: #000; opacity: 1; font-weight: bold; }
        .ranking-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .ranking-name { display: flex; align-items: center; gap: 10px;}
        .ranking-icon { width: 24px; height: 24px; border-radius: 50%; object-fit: cover;}
    </style>
</head>
<body>

    <nav id="main-nav" style="display: none;">
        <div class="user-info">
            <img id="nav-user-icon" class="user-icon" src="https://via.placeholder.com/32" alt="icon">
            <span id="nav-user-name">Guest</span>
        </div>
        <div class="nav-links">
            <button onclick="switchView('main')" class="active" id="nav-main">Timer</button>
            <button onclick="switchView('history')" id="nav-history">History</button>
            <button onclick="switchView('settings')" id="nav-settings">Settings</button>
            <button onclick="logout()">Logout</button>
        </div>
    </nav>

    <div id="view-login" class="view active">
        <div class="auth-card">
            <h2>Focus Connect</h2>
            <p style="margin-bottom: 20px; opacity: 0.8;">ログインして記録を始めましょう</p>
            <input type="email" id="email-input" class="auth-input" placeholder="メールアドレス">
            <input type="password" id="password-input" class="auth-input" placeholder="パスワード">
            <button onclick="loginWithEmail()" class="auth-btn btn-email">メールでログイン / 登録</button>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 20px 0;">
            <button onclick="loginWithGoogle()" class="auth-btn btn-google">Googleでログイン</button>
        </div>
    </div>

    <div id="view-main" class="view">
        <div id="timer-section">
            <div id="status-label">READY</div>
            
            <div class="session-dots">
                <div class="dot-wrapper" onclick="setSet(1)"><div class="dot"></div></div>
                <div class="dot-wrapper" onclick="setSet(2)"><div class="dot"></div></div>
                <div class="dot-wrapper" onclick="setSet(3)"><div class="dot"></div></div>
                <div class="dot-wrapper" onclick="setSet(4)"><div class="dot"></div></div>
            </div>

            <div id="timer">25:00</div>
            <div class="progress-container"><input type="range" id="seek-bar" value="0"></div>
            
            <div class="controls">
                <button class="main-btn" onclick="resetTimer()">Reset</button>
                <button class="main-btn" id="start-btn" onclick="toggleTimer()">START</button>
            </div>
        </div>
        <div id="ranking-section">
            <h3 style="margin-top:0; border-bottom: 1px solid var(--accent); padding-bottom:10px;">🏆 RANKING</h3>
            <div class="tab-container">
                <button onclick="changeRankingTab('today')" id="tab-today" class="tab-btn active">今日</button>
                <button onclick="changeRankingTab('yesterday')" id="tab-yesterday" class="tab-btn">昨日</button>
                <button onclick="changeRankingTab('weekly')" id="tab-weekly" class="tab-btn">週間</button>
            </div>
            <div id="ranking-list" style="flex:1; overflow-y:auto;">読み込み中...</div>
        </div>
    </div>

    <div id="view-history" class="view">
        <div style="width: 100%;">
            <h2 style="text-align: center;">作業履歴</h2>
            <div id="calendar"></div>
        </div>
    </div>

    <div id="view-settings" class="view">
        <div class="settings-card">
            <h2>設定</h2>
            <div class="settings-group">
                <label>ユーザー名</label>
                <input type="text" id="setting-name" class="auth-input">
            </div>
            <div class="settings-group">
                <label>アイコン画像 (PNG/JPG)</label>
                <input type="file" id="setting-icon" accept="image/*" class="auth-input" style="background:none;">
            </div>
            <div class="settings-group">
                <label>アラーム音 (MP3/WAV)</label>
                <input type="file" id="setting-alarm" accept="audio/*" class="auth-input" style="background:none;">
            </div>
            <div class="settings-group">
                <label>背景色 (作業中)</label>
                <input type="color" id="setting-bg-work" value="#0f172a" style="width:100%; height:40px; cursor:pointer;">
            </div>
            <div class="settings-group">
                <label>背景色 (休憩中)</label>
                <input type="color" id="setting-bg-break" value="#064e3b" style="width:100%; height:40px; cursor:pointer;">
            </div>
            <button onclick="saveSettings()" class="auth-btn btn-email">設定を保存</button>
            <p id="settings-msg" style="color:var(--accent); text-align:center; display:none;">保存しました！</p>
        </div>
    </div>

    <div id="long-break-modal" class="modal">
        <div class="modal-content">
            <h2 style="font-size: 2.5rem; margin-bottom: 20px;">Long Break ☕</h2>
            <p>4セット(1ポモ)完了お疲れ様です！休憩時間を選んでください。</p>
            <div style="display:flex; gap:15px; margin-top: 30px; justify-content: center;">
                <button class="modal-btn" onclick="setLongBreak(15)">15分</button>
                <button class="modal-btn" onclick="setLongBreak(30)">30分</button>
                <button class="modal-btn" onclick="setLongBreak(60)">60分</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, serverTimestamp, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCZh4ME9QimEx62f7SLc4F3lyorTzml_hY",
            authDomain: "sharetimer-fd215.firebaseapp.com",
            projectId: "sharetimer-fd215",
            storageBucket: "sharetimer-fd215.firebasestorage.app",
            messagingSenderId: "862201995112",
            appId: "1:862201995112:web:2b1b8d6a5cb74eb5d440dd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Global Variables
        window.currentUser = null;
        window.userData = { bgWork: "#0f172a", bgBreak: "#064e3b", alarmUrl: null };
        let currentAudio = null;

        // --- View Navigation ---
        window.switchView = function(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            if(document.getElementById(`nav-${viewId}`)) document.getElementById(`nav-${viewId}`).classList.add('active');
            if(viewId === 'history') loadCalendar();
            if(viewId === 'main') loadRanking('today');
        };

        // --- Authentication ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentUser = user;
                document.getElementById('main-nav').style.display = 'flex';
                document.getElementById('nav-user-name').textContent = user.displayName || user.email.split('@')[0];
                switchView('main');
                await loadUserSettings();
                // 許可リクエスト
                if (Notification.permission !== 'denied') Notification.requestPermission();
            } else {
                window.currentUser = null;
                document.getElementById('main-nav').style.display = 'none';
                switchView('login');
            }
        });

        window.loginWithGoogle = () => {
            signInWithPopup(auth, new GoogleAuthProvider()).catch(e => alert("ログインエラー: " + e.message));
        };

        window.loginWithEmail = async () => {
            const email = document.getElementById('email-input').value;
            const pass = document.getElementById('password-input').value;
            if(!email || !pass) return alert("入力してください");
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                // ユーザーがない場合は新規作成
                if(e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
                    if(confirm("アカウントが見つかりません。新規作成しますか？")) {
                        await createUserWithEmailAndPassword(auth, email, pass);
                    }
                } else alert(e.message);
            }
        };

        window.logout = () => signOut(auth);

        // --- User Settings ---
        async function loadUserSettings() {
            const docSnap = await getDoc(doc(db, "users", currentUser.uid));
            if(docSnap.exists()) {
                window.userData = { ...window.userData, ...docSnap.data() };
                document.getElementById('setting-name').value = userData.displayName || currentUser.displayName || "";
                document.getElementById('setting-bg-work').value = userData.bgWork;
                document.getElementById('setting-bg-break').value = userData.bgBreak;
                if(userData.photoURL) {
                    document.getElementById('nav-user-icon').src = userData.photoURL;
                }
            }
            applyBgColor();
        }

        window.saveSettings = async () => {
            const btn = document.querySelector('.btn-email'); btn.textContent = "保存中...";
            const name = document.getElementById('setting-name').value;
            const bgW = document.getElementById('setting-bg-work').value;
            const bgB = document.getElementById('setting-bg-break').value;
            const iconFile = document.getElementById('setting-icon').files[0];
            const alarmFile = document.getElementById('setting-alarm').files[0];

            let updates = { displayName: name, bgWork: bgW, bgBreak: bgB };

            if(iconFile) {
                const iconRef = ref(storage, `icons/${currentUser.uid}`);
                await uploadBytes(iconRef, iconFile);
                updates.photoURL = await getDownloadURL(iconRef);
                document.getElementById('nav-user-icon').src = updates.photoURL;
            }
            if(alarmFile) {
                const alarmRef = ref(storage, `alarms/${currentUser.uid}`);
                await uploadBytes(alarmRef, alarmFile);
                updates.alarmUrl = await getDownloadURL(alarmRef);
            }

            await setDoc(doc(db, "users", currentUser.uid), updates, { merge: true });
            window.userData = { ...window.userData, ...updates };
            document.getElementById('nav-user-name').textContent = name;
            
            btn.textContent = "設定を保存";
            const msg = document.getElementById('settings-msg'); msg.style.display="block";
            setTimeout(()=>msg.style.display="none", 3000);
            applyBgColor();
        };

        // --- Timer Logic (Background Safe) ---
        let duration = 25 * 60, timeLeft = 25 * 60, endTime = null, timerId = null, sessions = 1, mode = 'work';
        const timerDisplay = document.getElementById('timer'), startBtn = document.getElementById('start-btn'), seekBar = document.getElementById('seek-bar');
        const dots = document.querySelectorAll('.dot'), statusLabel = document.getElementById('status-label');

        function applyBgColor() {
            document.documentElement.style.setProperty('--bg-work', window.userData.bgWork);
            document.documentElement.style.setProperty('--bg-break', window.userData.bgBreak);
            document.body.style.backgroundColor = (mode === 'work') ? 'var(--bg-work)' : 'var(--bg-break)';
        }

        function updateUI() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            const timeStr = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            timerDisplay.textContent = timeStr;
            seekBar.max = duration; seekBar.value = duration - timeLeft;
            dots.forEach((dot, i) => dot.classList.toggle('active', i < sessions));
            const labelText = (statusLabel.textContent === 'READY') ? 'Focus' : statusLabel.textContent;
            document.title = `[${timeStr}] ${labelText}`;
        }

        window.setSet = (n) => { sessions = n; updateUI(); };

        seekBar.oninput = function() {
            timeLeft = duration - parseInt(this.value);
            if (timerId) endTime = Date.now() + (timeLeft * 1000); // 実行中にバーを動かした場合
            updateUI();
        };

        window.toggleTimer = () => {
            // Audio Unlock
            if(window.userData.alarmUrl && !currentAudio) {
                currentAudio = new Audio(window.userData.alarmUrl);
                currentAudio.play().then(()=> { currentAudio.pause(); currentAudio.currentTime=0; }).catch(()=>{});
            }

            if (timerId) {
                clearInterval(timerId); timerId = null;
                startBtn.textContent = "START";
            } else {
                endTime = Date.now() + (timeLeft * 1000);
                statusLabel.textContent = mode.toUpperCase();
                timerId = setInterval(() => {
                    // Date.now() を使うことでバックグラウンドでも遅延しない
                    timeLeft = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
                    updateUI();
                    if(timeLeft <= 0) { 
                        clearInterval(timerId); timerId = null; 
                        startBtn.textContent = "START";
                        handleEnd(); 
                    }
                }, 200);
                startBtn.textContent = "PAUSE";
            }
        };

        window.resetTimer = () => {
            clearInterval(timerId); timerId = null;
            timeLeft = duration; updateUI(); startBtn.textContent = "START";
        };

        async function handleEnd() {
            playAlarm();
            
            // 1. 通知を作成し、変数（noti）に入れておく
            if (Notification.permission === 'granted') {
                const noti = new Notification(
                    mode === 'work' ? "作業完了！☕️" : "休憩終了！💻", 
                    { body: "通知をクリックして次を開始" }
                );

                // 2. 通知がクリックされた時の処理を追加
                noti.onclick = function() {
                    window.focus(); // ブラウザを最前面に持ってくる
                    this.close();   // 通知を閉じる
                    
                    // 長休憩の選択画面が出ている時以外は、自動でタイマーを開始する
                    if (document.getElementById('long-break-modal').style.display !== 'flex') {
                        toggleTimer(); 
                    }
                };
            }

            // 今までの状態切り替えと記録の処理
            if (mode === 'work') {
                await savePomoRecord();

                if (sessions >= 4) {
                    document.getElementById('long-break-modal').style.display = 'flex';
                } else {
                    initBreak(5);
                }
            } else {
                initWork();
            }
        }
        async function savePomoRecord() {
            if(!currentUser) return;
            try {
                await addDoc(collection(db, "pomodoros"), {
                    uid: currentUser.uid,
                    displayName: window.userData.displayName || currentUser.displayName || "Unknown",
                    photoURL: window.userData.photoURL || "https://via.placeholder.com/32",
                    timestamp: serverTimestamp()
                });
                loadRanking('today'); // ランキング更新
            } catch(e) { console.error("記録エラー", e); }
        }

        function initWork() { 
            mode='work'; duration=25*60; timeLeft=duration; 
            if(statusLabel.textContent !== 'READY') sessions = (sessions >= 4) ? 1 : sessions + 1;
            applyBgColor(); statusLabel.textContent = "FOCUS"; updateUI(); 
        }

        function initBreak(m) { 
            mode='break'; duration=m*60; timeLeft=duration; 
            document.body.style.backgroundColor=(m>=15)?'var(--bg-long)':'var(--bg-break)'; 
            statusLabel.textContent = "BREAK"; updateUI(); 
        }

        window.setLongBreak = (m) => { document.getElementById('long-break-modal').style.display='none'; sessions = 4; initBreak(m); }

        function playAlarm() { 
            if(currentAudio) {
                currentAudio.currentTime = 0; currentAudio.play().catch(e=>fallbackBeep());
            } else fallbackBeep();
        }

        function fallbackBeep() {
            const ctx=new (window.AudioContext || window.webkitAudioContext)(), osc=ctx.createOscillator(), g=ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value=880; g.gain.linearRampToValueAtTime(0.5, ctx.currentTime+0.1);
            g.gain.linearRampToValueAtTime(0, ctx.currentTime+1);
            osc.start(); osc.stop(ctx.currentTime+1);
        }

        // --- Ranking ---
        window.changeRankingTab = (filter) => {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + filter).classList.add('active');
            loadRanking(filter);
        }

        async function loadRanking(filter) {
            const listEl = document.getElementById('ranking-list');
            listEl.innerHTML = "読み込み中...";
            
            let startTime = new Date();
            startTime.setHours(0,0,0,0); // 今日の始まり
            if(filter === 'yesterday') { startTime.setDate(startTime.getDate()-1); }
            if(filter === 'weekly') { startTime.setDate(startTime.getDate()-7); }
            
            let endTime = new Date(startTime);
            if(filter === 'yesterday') { endTime.setDate(endTime.getDate()+1); }
            else { endTime = new Date(); }

            const q = query(collection(db, "pomodoros"), 
                where("timestamp", ">=", startTime),
                where("timestamp", "<", endTime)
            );

            try {
                const querySnapshot = await getDocs(q);
                const counts = {};
                const usersInfo = {};
                
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    counts[data.uid] = (counts[data.uid] || 0) + 1;
                    usersInfo[data.uid] = { name: data.displayName, icon: data.photoURL };
                });

                const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
                if(sorted.length === 0) {
                    listEl.innerHTML = `<div style='font-size:0.8rem; opacity:0.5; text-align:center; margin-top:20px;'>記録なし</div>`;
                    return;
                }

                listEl.innerHTML = sorted.map(([uid, count]) => `
                    <div class="ranking-item">
                        <div class="ranking-name">
                            <img src="${usersInfo[uid].icon}" class="ranking-icon">
                            <span>${usersInfo[uid].name}</span>
                        </div>
                        <span style="color:var(--accent); font-weight:bold;">${count} ポモ</span>
                    </div>
                `).join('');
            } catch (error) {
                console.error(error);
                // ※初回はFirestoreのインデックス作成が必要なエラーが出るため、コンソールリンクを確認してください
                listEl.innerHTML = `<div style='font-size:0.8rem; color:red;'>インデックス作成が必要です(F12コンソール参照)</div>`;
            }
        }

        // --- Calendar (History) ---
        let calendarInstance = null;
        async function loadCalendar() {
            if(!currentUser) return;
            const q = query(collection(db, "pomodoros"), where("uid", "==", currentUser.uid));
            const querySnapshot = await getDocs(q);
            const counts = {};
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                if(data.timestamp) {
                    const date = data.timestamp.toDate();
                    const key = date.getFullYear() + "-" + ("0"+(date.getMonth()+1)).slice(-2) + "-" + ("0"+date.getDate()).slice(-2);
                    counts[key] = (counts[key] || 0) + 1;
                }
            });

            const events = Object.keys(counts).map(date => ({
                title: `${counts[date]} ポモ`, start: date, allDay: true, backgroundColor: '#38bdf8', borderColor: '#38bdf8', textColor: '#000'
            }));

            const calendarEl = document.getElementById('calendar');
            if(calendarInstance) calendarInstance.destroy();
            calendarInstance = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ja',
                events: events,
                height: 'auto'
            });
            calendarInstance.render();
        }

        updateUI();
    </script>
</body>
</html>
