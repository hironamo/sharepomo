<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ShareTimer</title>
  <style>
    :root{--work:#0f172a;--break:#064e3b;--long:#1e3a8a;--fg:#f8fafc;--acc:#38bdf8;--card:#111827}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:var(--work);color:var(--fg)}
    .layout{display:grid;grid-template-columns:320px 1fr;min-height:100vh}
    .panel{background:#0b1220;padding:20px;border-right:1px solid #223}
    .main{display:flex;align-items:center;justify-content:center;position:relative;padding:24px}
    .card{width:min(760px,95%);text-align:center}
    .top{display:flex;gap:10px;justify-content:space-between;align-items:center;margin-bottom:8px}
    input,button{border-radius:10px;border:1px solid #334;background:#111827;color:#fff;padding:10px}
    button{cursor:pointer}
    #timer{font-size:min(22vw,180px);font-weight:800;line-height:1;margin:16px 0}
    .dots{display:flex;justify-content:center;gap:8px;margin:12px 0}
    .dot{width:14px;height:14px;border-radius:50%;background:#334}.dot.on{background:var(--acc);box-shadow:0 0 10px var(--acc)}
    .controls{display:flex;justify-content:center;gap:12px;margin-top:16px}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.86);display:flex;align-items:center;justify-content:center}
    .box{background:var(--card);padding:20px;border-radius:14px;border:1px solid #334;width:min(360px,92%)}
    .rank-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #223}
    .small{font-size:12px;opacity:.8}
  </style>
</head>
<body>
  <div id="authModal" class="modal">
    <div class="box">
      <h3>ログイン</h3>
      <input id="email" type="email" placeholder="Email" style="width:100%;margin-bottom:8px" />
      <input id="pass" type="password" placeholder="Password" style="width:100%;margin-bottom:8px" />
      <button onclick="loginEmail()" style="width:100%;margin-bottom:6px">メールでログイン</button>
      <button onclick="registerEmail()" style="width:100%;margin-bottom:6px">新規登録</button>
      <button onclick="loginGoogle()" style="width:100%">Googleでログイン</button>
      <p id="authMsg" class="small"></p>
    </div>
  </div>

  <audio id="alarm" src="omedetou (1).mp3" preload="auto"></audio>
  <div class="layout">
    <aside class="panel">
      <h3>ランキング</h3>
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <button onclick="setFilter('today')" id="f-today">今日</button>
        <button onclick="setFilter('yesterday')" id="f-yesterday">昨日</button>
        <button onclick="setFilter('weekly')" id="f-weekly">週間</button>
      </div>
      <div id="ranking"></div>
      <p id="sync" class="small">未同期</p>
    </aside>

    <main class="main">
      <div class="card">
        <div class="top">
          <div style="display:flex;gap:8px;align-items:center">
            <input id="displayName" placeholder="表示名" />
            <button onclick="saveName()">保存</button>
          </div>
          <div style="display:flex;gap:8px"><button onclick="location.href='history.html'">履歴</button><button onclick="logout()">ログアウト</button></div>
        </div>

        <div id="status">READY</div>
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div id="timer">25:00</div>
        <input id="seek" type="range" value="0" style="width:min(600px,95%)" />
        <div class="controls"><button onclick="resetTimer()">Reset</button><button id="start">START</button></div>
      </div>
    </main>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
const cfg={apiKey:"AIzaSyCZh4ME9QimEx62f7SLc4F3lyorTzml_hY",authDomain:"sharetimer-fd215.firebaseapp.com",projectId:"sharetimer-fd215",storageBucket:"sharetimer-fd215.firebasestorage.app",messagingSenderId:"862201995112",appId:"1:862201995112:web:2b1b8d6a5cb74eb5d440dd"};
firebase.initializeApp(cfg); const auth=firebase.auth(); const db=firebase.firestore();
const el={timer:document.getElementById('timer'),seek:document.getElementById('seek'),start:document.getElementById('start'),status:document.getElementById('status'),dots:[...document.querySelectorAll('.dot')],sync:document.getElementById('sync'),rank:document.getElementById('ranking')};
let user=null, mode='work', sessions=1, duration=1500, timeLeft=1500, endAt=null, id=null, filter='today', workStartedAt=null;
function fmt(n){const m=Math.floor(n/60),s=n%60;return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
function paint(){el.timer.textContent=fmt(timeLeft);el.seek.max=duration;el.seek.value=duration-timeLeft;el.dots.forEach((d,i)=>d.classList.toggle('on',i<sessions));document.body.style.background=mode==='work'?'var(--work)':duration>=900?'var(--long)':'var(--break)';}
function setFilter(v){filter=v;fetchRank()} window.setFilter=setFilter;
function reqNotify(){if('Notification' in window&&Notification.permission==='default')Notification.requestPermission().catch(()=>{})}
function notify(){if('Notification' in window&&Notification.permission==='granted')new Notification('タイマー終了',{body:'次のタイマーを開始できます。',requireInteraction:true})}
function beep(){const a=document.getElementById('alarm');a.currentTime=0;a.play().catch(()=>{})}
function start(){if(mode==='work'&&!workStartedAt)workStartedAt=new Date();endAt=Date.now()+timeLeft*1000;id=setInterval(()=>{timeLeft=Math.max(0,Math.ceil((endAt-Date.now())/1000));paint();if(timeLeft===0){pause();done()}},200);el.start.textContent='PAUSE'}
function pause(){clearInterval(id);id=null;el.start.textContent='START'}
function initWork(){mode='work';duration=1500;timeLeft=1500;el.status.textContent='FOCUS';sessions=sessions>=4?1:sessions+1;paint()}
function initBreak(m){mode='break';duration=m*60;timeLeft=duration;el.status.textContent='BREAK';paint()}
async function done(){beep();notify();if(mode==='work'){await savePomo(); if(sessions>=4){const m=Number(prompt('4セット完了。休憩分(15/30/60)', '15'))||15;initBreak([15,30,60].includes(m)?m:15);} else initBreak(5);} else initWork();}
async function savePomo(){if(!user||!workStartedAt) return; const end=new Date(); await db.collection('pomodoros').add({userId:user.uid,name:document.getElementById('displayName').value||'User',startAt:firebase.firestore.Timestamp.fromDate(workStartedAt),endAt:firebase.firestore.Timestamp.fromDate(end),durationSec:1500,createdAt:firebase.firestore.FieldValue.serverTimestamp()}); workStartedAt=null;el.sync.textContent='記録完了';await fetchRank();}
async function fetchRank(){const now=new Date(),y=new Date(now);y.setDate(now.getDate()-1),w=new Date(now);w.setDate(now.getDate()-7);const s=await db.collection('pomodoros').orderBy('startAt','desc').limit(800).get();const c={};s.forEach(d=>{const v=d.data();if(!v.startAt)return;const dt=v.startAt.toDate();const ok=(filter==='today'&&dt.toDateString()===now.toDateString())||(filter==='yesterday'&&dt.toDateString()===y.toDateString())||(filter==='weekly'&&dt>w);if(ok)c[v.name||'Unknown']=(c[v.name||'Unknown']||0)+1});const arr=Object.entries(c).sort((a,b)=>b[1]-a[1]);el.rank.innerHTML=arr.length?arr.map(([n,k])=>`<div class='rank-item'><span>${n}</span><b>${k} ポモ</b></div>`).join(''):'記録なし'}
window.registerEmail=async()=>{try{await auth.createUserWithEmailAndPassword(email.value,pass.value)}catch(e){authMsg.textContent=e.message}};
window.loginEmail=async()=>{try{await auth.signInWithEmailAndPassword(email.value,pass.value)}catch(e){authMsg.textContent=e.message}};
window.loginGoogle=async()=>{try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())}catch(e){authMsg.textContent=e.message}};
window.logout=()=>auth.signOut();
window.saveName=async()=>{if(!user)return;await db.collection('users').doc(user.uid).set({displayName:displayName.value,photoURL:user.photoURL||''},{merge:true})};
auth.onAuthStateChanged(async u=>{user=u;authModal.style.display=u?'none':'flex';if(!u)return;const ref=db.collection('users').doc(u.uid);const snap=await ref.get();if(!snap.exists)await ref.set({displayName:u.displayName||'User',photoURL:u.photoURL||'',createdAt:firebase.firestore.FieldValue.serverTimestamp()});displayName.value=(await ref.get()).data().displayName||'User';await fetchRank();});
el.seek.oninput=e=>{timeLeft=duration-Number(e.target.value); if(id) endAt=Date.now()+timeLeft*1000; paint();};
el.start.onclick=()=>{reqNotify(); if(id) pause(); else start();};
window.resetTimer=()=>location.reload();
paint();
</script>
</body>
</html>
