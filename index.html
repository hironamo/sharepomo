<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Connect Pro - Party</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <style>
        :root {
            --bg-work: #0f172a; --bg-break: #064e3b; --bg-long: #1e3a8a;
            --accent: #38bdf8; --text: #f8fafc; --sidebar-bg: rgba(0,0,0,0.85);
        }
        body {
            margin: 0; display: flex; height: 100vh; background-color: var(--bg-work); 
            background-size: cover; background-position: center; color: var(--text);
            font-family: -apple-system, sans-serif; transition: 0.8s; overflow: hidden;
        }
        /* サイドバー */
        #sidebar {
            width: 300px; height: 100%; background: var(--sidebar-bg); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column;
            transition: transform 0.4s ease; z-index: 1000; position: fixed; transform: translateX(-100%);
        }
        #sidebar.open { transform: translateX(0); }
        .sidebar-toggle {
            position: fixed; top: 20px; left: 20px; z-index: 1001; 
            background: rgba(255,255,255,0.1); border: none; color: white;
            padding: 10px; border-radius: 8px; cursor: pointer;
        }

        /* メインエリア */
        #main-content { flex: 1; display: flex; flex-direction: column; position: relative; margin-left: 0; transition: 0.4s; }
        .content-active-sidebar #main-content { margin-left: 300px; }

        .view { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        .view.active { display: flex; }

        /* パーティUI */
        .party-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; margin: 10px; }
        #room-id-display { font-weight: bold; color: var(--accent); font-size: 1.5rem; }

        /* タイマーUI */
        #timer { font-size: clamp(4rem, 18vw, 12rem); font-weight: 800; line-height: 1; margin: 20px 0; font-variant-numeric: tabular-nums; }
        .session-dots { display: flex; gap: 10px; }
        .dot { width: 18px; height: 18px; border-radius: 50%; background: rgba(255,255,255,0.2); }
        .dot.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        
        .progress-container { width: 70%; max-width: 500px; margin: 20px 0; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 4px; cursor: pointer; }
        
        .controls { display: flex; gap: 20px; }
        .main-btn { padding: 1.2rem 2.5rem; font-size: 1.2rem; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        #start-btn { background: var(--text); color: black; min-width: 160px; }
        
        /* 履歴・設定 */
        .scroll-area { width: 100%; max-width: 600px; padding: 40px; overflow-y: auto; }
        #calendar { background: white; color: black; padding: 10px; border-radius: 10px; }

        /* ログイン */
        .auth-box { text-align: center; background: rgba(0,0,0,0.6); padding: 40px; border-radius: 20px; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
    </style>
</head>
<body class="content-active-sidebar">

    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

    <div id="sidebar" class="open">
        <div style="padding: 60px 20px 20px;">
            <div class="user-info" style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
                <img id="side-user-icon" style="width:40px; height:40px; border-radius:50%;" src="https://via.placeholder.com/40">
                <span id="side-user-name">Guest</span>
            </div>

            <div class="party-card">
                <h3>👥 PARTY MODE</h3>
                <div id="party-join-ui">
                    <input type="number" id="room-input" placeholder="3桁の部屋番号" class="auth-input" style="font-size: 1.2rem; text-align:center;">
                    <button onclick="joinRoom()" style="width:100%; padding:10px; background:var(--accent); border:none; border-radius:8px; font-weight:bold;">参加 / 作成</button>
                </div>
                <div id="party-info-ui" style="display:none; text-align:center;">
                    <p>ROOM: <span id="room-id-display">---</span></p>
                    <p id="party-status" style="font-size:0.8rem; opacity:0.7;">待機中...</p>
                    <button onclick="leaveRoom()" style="color:red; background:none; border:none; cursor:pointer;">部屋を抜ける</button>
                </div>
            </div>

            <nav style="display:grid; gap:10px; margin-top:20px;">
                <button onclick="switchView('main')" class="main-btn" style="font-size:0.9rem; padding:10px;">Timer</button>
                <button onclick="switchView('history')" class="main-btn" style="font-size:0.9rem; padding:10px;">History</button>
                <button onclick="switchView('settings')" class="main-btn" style="font-size:0.9rem; padding:10px;">Settings</button>
                <button onclick="logout()" style="color:gray; background:none; border:none; margin-top:10px;">Logout</button>
            </nav>

            <div id="ranking-section" style="margin-top:30px;">
                <h4 style="border-bottom:1px solid var(--accent);">Ranking</h4>
                <div id="ranking-list" style="font-size:0.85rem;"></div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <div id="view-login" class="view active">
            <div class="auth-box">
                <h1>Focus Connect</h1>
                <input type="email" id="login-email" class="auth-input" placeholder="Email">
                <input type="password" id="login-pass" class="auth-input" placeholder="Password">
                <button onclick="loginEmail()" class="main-btn" style="width:100%; background:var(--accent); color:black;">Login / Sign Up</button>
                <p>or</p>
                <button onclick="loginGoogle()" class="main-btn" style="width:100%; background:white; color:black;">Google Login</button>
            </div>
        </div>

        <div id="view-main" class="view">
            <div id="status-label" style="opacity:0.6; letter-spacing:0.3rem;">READY</div>
            <div class="session-dots">
                <div class="dot" id="dot1"></div><div class="dot" id="dot2"></div><div class="dot" id="dot3"></div><div class="dot" id="dot4"></div>
            </div>
            <div id="timer">25:00</div>
            <div class="progress-container"><input type="range" id="seek-bar" value="0"></div>
            <div class="controls">
                <button class="main-btn" onclick="resetTimer()">Reset</button>
                <button class="main-btn" id="start-btn" onclick="requestToggle()">START</button>
            </div>
        </div>

        <div id="view-history" class="view">
            <div class="scroll-area"><div id="calendar"></div></div>
        </div>

        <div id="view-settings" class="view">
            <div class="scroll-area" style="background:rgba(0,0,0,0.5); border-radius:20px;">
                <h2>Settings</h2>
                <label>ユーザー名</label><input type="text" id="set-name" class="auth-input">
                <label>アイコン画像</label><input type="file" id="set-icon" class="auth-input" accept="image/*">
                <label>アラーム音</label><input type="file" id="set-alarm" class="auth-input" accept="audio/*">
                <label>背景画像URL</label><input type="text" id="set-bg-url" class="auth-input" placeholder="https://...">
                <button onclick="saveSettings()" class="main-btn" style="background:var(--accent); width:100%; color:black; margin-top:20px;">Save Changes</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, collection, addDoc, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZh4ME9QimEx62f7SLc4F3lyorTzml_hY",
            authDomain: "sharetimer-fd215.firebaseapp.com",
            projectId: "sharetimer-fd215",
            storageBucket: "sharetimer-fd215.firebasestorage.app",
            messagingSenderId: "862201995112",
            appId: "1:862201995112:web:2b1b8d6a5cb74eb5d440dd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // State
        let timeLeft = 25 * 60, duration = 25 * 60, timerId = null, sessions = 1, mode = 'work', currentRoom = null, roomUnsub = null;
        window.userData = { name: "Guest", icon: "", alarm: "", bgUrl: "", bgWork: "#0f172a", bgBreak: "#064e3b" };
        const alarmAudio = new Audio();

        // ログイン監視
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await loadSettings(user.uid);
                switchView('main');
                loadRanking();
            } else {
                switchView('login');
            }
        });

        // 画面切り替え
        window.switchView = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            if(id === 'history') renderCalendar();
        };

        window.toggleSidebar = () => {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('open');
            document.body.classList.toggle('content-active-sidebar');
        };

        // --- パーティモード ---
        window.joinRoom = async () => {
            const roomId = document.getElementById('room-input').value;
            if (roomId.length !== 3) return alert("3桁の数字を入力してください");
            
            currentRoom = roomId;
            document.getElementById('party-join-ui').style.display = 'none';
            document.getElementById('party-info-ui').style.display = 'block';
            document.getElementById('room-id-display').textContent = roomId;

            // 部屋の同期開始
            if (roomUnsub) roomUnsub();
            roomUnsub = onSnapshot(doc(db, "rooms", roomId), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    syncTimerFromRoom(data);
                } else {
                    // 初めての部屋なら初期化
                    setDoc(doc(db, "rooms", roomId), { status: 'idle', mode: 'work', sessions: 1 });
                }
            });
        };

        window.leaveRoom = () => {
            if (roomUnsub) roomUnsub();
            currentRoom = null;
            document.getElementById('party-join-ui').style.display = 'block';
            document.getElementById('party-info-ui').style.display = 'none';
            resetTimer();
        };

        // パーティ同期ロジック
        function syncTimerFromRoom(data) {
            mode = data.mode;
            sessions = data.sessions;
            duration = (mode === 'work') ? 25 * 60 : (sessions >= 4 ? 30 * 60 : 5 * 60);

            if (data.status === 'running') {
                const serverEndTime = data.endTime;
                const now = Date.now();
                timeLeft = Math.max(0, Math.ceil((serverEndTime - now) / 1000));
                if (!timerId && timeLeft > 0) startLocalTimer(serverEndTime);
            } else {
                stopLocalTimer();
                timeLeft = duration;
            }
            updateUI();
        }

        // スタート要求
        window.requestToggle = async () => {
            // 音声をアンロック（iPad対策）
            alarmAudio.play().then(() => { alarmAudio.pause(); }).catch(() => {});

            if (!currentRoom) return toggleLocalTimer();

            const roomRef = doc(db, "rooms", currentRoom);
            if (timerId) {
                await updateDoc(roomRef, { status: 'idle' });
            } else {
                const newEndTime = Date.now() + (timeLeft * 1000);
                await updateDoc(roomRef, { status: 'running', endTime: newEndTime, mode: mode, sessions: sessions });
            }
        };

        // --- タイマー本体 ---
        function startLocalTimer(targetTime) {
            if (timerId) clearInterval(timerId);
            timerId = setInterval(() => {
                const now = Date.now();
                timeLeft = Math.max(0, Math.ceil((targetTime - now) / 1000));
                updateUI();
                if (timeLeft <= 0) {
                    stopLocalTimer();
                    handleTimerEnd();
                }
            }, 200);
            document.getElementById('start-btn').textContent = "PAUSE";
        }

        function stopLocalTimer() {
            clearInterval(timerId);
            timerId = null;
            document.getElementById('start-btn').textContent = "START";
        }

        function updateUI() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
            document.getElementById('status-label').textContent = mode.toUpperCase();
            for(let i=1; i<=4; i++) document.getElementById('dot'+i).classList.toggle('active', i <= sessions);
            document.getElementById('seek-bar').max = duration;
            document.getElementById('seek-bar').value = duration - timeLeft;
            applyVisuals();
        }

        async function handleTimerEnd() {
            if (mode === 'work') {
                playAlarm();
                await savePomo();
                if (sessions >= 4) {
                    if(!currentRoom) alert("長休憩の時間です！30分休みましょう。");
                    initBreak(30);
                } else {
                    initBreak(5);
                }
            } else {
                initWork();
            }
        }

        // iPad対策: 復帰時に時間を再計算
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible" && currentRoom) {
                // パーティ中なら部屋情報から強制再同期
                getDoc(doc(db, "rooms", currentRoom)).then(snap => {
                    if(snap.exists()) syncTimerFromRoom(snap.data());
                });
            }
        });

        // --- データ保存・読込 ---
        async function loadSettings(uid) {
            const snap = await getDoc(doc(db, "users", uid));
            if (snap.exists()) {
                window.userData = { ...window.userData, ...snap.data() };
                document.getElementById('side-user-name').textContent = window.userData.name;
                document.getElementById('set-name').value = window.userData.name;
                if (window.userData.icon) document.getElementById('side-user-icon').src = window.userData.icon;
                if (window.userData.alarm) alarmAudio.src = window.userData.alarm;
            }
            applyVisuals();
        }

        window.saveSettings = async () => {
            const uid = auth.currentUser.uid;
            const name = document.getElementById('set-name').value;
            const bgUrl = document.getElementById('set-bg-url').value;
            const iconFile = document.getElementById('set-icon').files[0];
            const alarmFile = document.getElementById('set-alarm').files[0];

            let updates = { name, bgUrl };
            if (iconFile) {
                const r = ref(storage, `icons/${uid}`);
                await uploadBytes(r, iconFile);
                updates.icon = await getDownloadURL(r);
            }
            if (alarmFile) {
                const r = ref(storage, `alarms/${uid}`);
                await uploadBytes(r, alarmFile);
                updates.alarm = await getDownloadURL(r);
            }

            await setDoc(doc(db, "users", uid), updates, { merge: true });
            alert("Saved!");
            location.reload();
        };

        function applyVisuals() {
            if (window.userData.bgUrl) {
                document.body.style.backgroundImage = `url(${window.userData.bgUrl})`;
            } else {
                document.body.style.backgroundImage = "none";
                document.body.style.backgroundColor = (mode === 'work') ? window.userData.bgWork : window.userData.bgBreak;
            }
        }

        async function savePomo() {
            await addDoc(collection(db, "pomodoros"), {
                uid: auth.currentUser.uid,
                name: window.userData.name,
                icon: window.userData.icon || "",
                timestamp: serverTimestamp()
            });
            loadRanking();
        }

        // --- ヘルパー ---
        function initWork() { mode = 'work'; sessions = (sessions >= 4) ? 1 : sessions + 1; timeLeft = 25 * 60; duration = 25 * 60; updateUI(); }
        function initBreak(m) { mode = 'break'; timeLeft = m * 60; duration = m * 60; updateUI(); }
        function playAlarm() { alarmAudio.play().catch(() => {}); }
        window.resetTimer = () => { stopLocalTimer(); initWork(); };

        // --- 認証 ---
        window.loginEmail = async () => {
            const e = document.getElementById('login-email').value, p = document.getElementById('login-pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); }
            catch { await createUserWithEmailAndPassword(auth, e, p); }
        };
        window.loginGoogle = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);

        // --- ランキング & カレンダー ---
        async function loadRanking() {
            const qPomo = query(collection(db, "pomodoros"), where("timestamp", ">", new Date(Date.now() - 86400000)));
            const snap = await getDocs(qPomo);
            const counts = {};
            snap.forEach(d => { const n = d.data().name; counts[n] = (counts[n] || 0) + 1; });
            const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
            document.getElementById('ranking-list').innerHTML = sorted.map(([n,c]) => `<div>${n}: ${c}ポモ</div>`).join('');
        }

        let cal = null;
        async function renderCalendar() {
            const qPomo = query(collection(db, "pomodoros"), where("uid", "==", auth.currentUser.uid));
            const snap = await getDocs(qPomo);
            const events = snap.map(d => ({ title: "1ポモ", start: d.data().timestamp?.toDate() }));
            if(!cal) cal = new FullCalendar.Calendar(document.getElementById('calendar'), { initialView: 'dayGridMonth', events });
            cal.render();
        }

    </script>
</body>
</html>
