<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Connect Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <style>
        :root {
            --bg-work: #0f172a; --bg-break: #064e3b; --bg-long: #1e3a8a;
            --accent: #38bdf8; --text: #f8fafc; --sidebar-bg: rgba(0,0,0,0.85);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; display: flex; height: 100vh; background-color: var(--bg-work); 
            color: var(--text); font-family: -apple-system, sans-serif; 
            transition: background-color 0.8s; overflow: hidden;
            background-size: cover; background-position: center; background-attachment: fixed; background-repeat: no-repeat;
        }

        /* --- Sidebar --- */
        #sidebar {
            width: 300px; height: 100%; background: var(--sidebar-bg); backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column;
            position: fixed; left: -300px; transition: 0.3s ease; z-index: 1000; overflow-y: auto;
        }
        #sidebar.open { left: 0; }
        
        .sidebar-toggle {
            position: fixed; top: 15px; left: 15px; z-index: 1001; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 15px;
            border-radius: 8px; cursor: pointer; font-size: 1.2rem; backdrop-filter: blur(5px);
        }

        .sidebar-content { padding: 70px 20px 20px; display: flex; flex-direction: column; gap: 20px; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-icon { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #ccc; }
        
        .nav-btn {
            background: rgba(255,255,255,0.1); border: none; color: white; padding: 12px;
            border-radius: 8px; text-align: left; cursor: pointer; transition: 0.2s; font-size: 1rem;
        }
        .nav-btn:hover, .nav-btn.active { background: var(--accent); color: black; font-weight: bold; }

        /* --- Main Content Layout --- */
        #main-content {
            flex: 1; display: flex; flex-direction: column; position: relative;
            width: 100%; transition: margin-left 0.3s ease;
        }
        /* PC等画面が広い時、サイドバーの分だけメインエリアをずらす */
        @media (min-width: 768px) {
            body.sidebar-active #main-content { margin-left: 300px; }
        }

        /* --- Views --- */
        .view { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; padding: 20px; overflow-y: auto;}
        .view.active { display: flex; }

        /* --- Login View --- */
        .glass-card { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 30px; border-radius: 15px; width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); }
        .auth-input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: none; box-sizing: border-box;}
        .btn-full { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s;}

        /* --- Timer UI --- */
        #status-label { letter-spacing: 0.3rem; opacity: 0.8; margin-bottom: 10px; font-size: 1.5rem; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5);}
        .session-dots { display: flex; gap: 15px; margin-bottom: 20px; }
        .dot { width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s; }
        .dot.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        #timer { font-size: clamp(5rem, 20vw, 12rem); font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        
        .progress-container { width: 90%; max-width: 600px; margin: 30px 0; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 4px; outline: none; cursor: pointer; accent-color: var(--accent); }
        
        .controls { display: flex; gap: 20px; }
        .main-btn { padding: 1rem 2.5rem; font-size: 1.2rem; border-radius: 50px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: white; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .btn-start { background: var(--text); color: #000; min-width: 160px; }

        /* --- Modals & History --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-work); padding: 30px; border-radius: 15px; text-align: center; border: 1px solid var(--accent); }
        #calendar-wrapper { width: 100%; max-width: 800px; background: white; color: black; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>

    <button class="sidebar-toggle" onclick="toggleSidebar()" id="btn-sidebar-toggle" style="display: none;">☰ メニュー</button>

    <div id="sidebar">
        <div class="sidebar-content">
            <div class="user-info">
                <img id="nav-user-icon" class="user-icon" src="https://via.placeholder.com/45" alt="icon">
                <div>
                    <div id="nav-user-name" style="font-weight: bold;">Guest</div>
                    <div style="font-size: 0.8rem; opacity: 0.7; cursor: pointer; color: #ff6b6b;" onclick="logout()">ログアウト</div>
                </div>
            </div>

            <nav style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
                <button class="nav-btn active" onclick="switchView('main')" id="nav-main">⏱ タイマー</button>
                <button class="nav-btn" onclick="switchView('history')" id="nav-history">📅 履歴カレンダー</button>
                <button class="nav-btn" onclick="switchView('settings')" id="nav-settings">⚙ 設定</button>
            </nav>

            <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); margin-top: 20px;">
                <h3 style="margin-top:0; font-size:1rem;">🏆 ランキング</h3>
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <button onclick="loadRanking('today')" class="btn-full" style="padding:5px; margin:0; background:rgba(255,255,255,0.1); color:white;">今日</button>
                    <button onclick="loadRanking('yesterday')" class="btn-full" style="padding:5px; margin:0; background:rgba(255,255,255,0.1); color:white;">昨日</button>
                    <button onclick="loadRanking('weekly')" class="btn-full" style="padding:5px; margin:0; background:rgba(255,255,255,0.1); color:white;">週間</button>
                </div>
                <div id="ranking-list" style="font-size: 0.9rem; max-height: 200px; overflow-y: auto;">読込中...</div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <div id="view-login" class="view active">
            <div class="glass-card" style="text-align: center;">
                <h2 style="margin-top: 0;">Focus Connect Pro</h2>
                <p style="margin-bottom: 20px; opacity: 0.8;">ログインして記録を始めましょう</p>
                <input type="email" id="email-input" class="auth-input" placeholder="メールアドレス">
                <input type="password" id="password-input" class="auth-input" placeholder="パスワード">
                <button onclick="loginWithEmail()" class="btn-full" style="background: var(--accent); color: black;">メールでログイン / 登録</button>
                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 20px 0;">
                <button onclick="loginWithGoogle()" class="btn-full" style="background: white; color: black;">Googleでログイン</button>
            </div>
        </div>

        <div id="view-main" class="view">
            <div id="status-label">READY</div>
            
            <div class="session-dots">
                <div class="dot active" id="dot-1" onclick="setSet(1)"></div>
                <div class="dot" id="dot-2" onclick="setSet(2)"></div>
                <div class="dot" id="dot-3" onclick="setSet(3)"></div>
                <div class="dot" id="dot-4" onclick="setSet(4)"></div>
            </div>

            <div id="timer">25:00</div>
            <div class="progress-container"><input type="range" id="seek-bar" value="0"></div>
            
            <div class="controls">
                <button class="main-btn" onclick="resetTimer()">Reset</button>
                <button class="main-btn btn-start" id="start-btn" onclick="toggleTimer()">START</button>
            </div>
        </div>

        <div id="view-history" class="view">
            <h2 style="text-shadow: 0 2px 4px rgba(0,0,0,0.5);">作業履歴</h2>
            <div id="calendar-wrapper"><div id="calendar"></div></div>
        </div>

        <div id="view-settings" class="view">
            <div class="glass-card" style="max-height: 90vh; overflow-y: auto;">
                <h2 style="margin-top: 0;">設定</h2>
                
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:8px; opacity:0.8;">ユーザー名</label>
                    <input type="text" id="setting-name" class="auth-input" style="background: rgba(255,255,255,0.9); color: black;">
                </div>
                
                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 20px 0;">

                <div style="margin-bottom: 20px;">
                    <label style="font-weight: bold; font-size: 1.1rem; color: var(--accent);">背景の表示設定</label>
                    <div style="display:flex; gap: 20px; align-items:center; margin-top: 10px;">
                        <label style="cursor:pointer;"><input type="radio" name="bg-type" value="color" checked onchange="toggleBgSettings()"> 🎨 色を指定</label>
                        <label style="cursor:pointer;"><input type="radio" name="bg-type" value="image" onchange="toggleBgSettings()"> 🖼 画像を使用</label>
                    </div>
                </div>

                <div id="setting-bg-color-area">
                    <div style="margin-bottom: 20px;">
                        <label style="display:block; margin-bottom:8px; opacity:0.8;">背景色 (作業中)</label>
                        <input type="color" id="setting-bg-work" value="#0f172a" style="width:100%; height:40px; cursor:pointer; background:none; border:none; padding:0;">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="display:block; margin-bottom:8px; opacity:0.8;">背景色 (休憩中)</label>
                        <input type="color" id="setting-bg-break" value="#064e3b" style="width:100%; height:40px; cursor:pointer; background:none; border:none; padding:0;">
                    </div>
                </div>

                <div id="setting-bg-image-area" style="display: none; margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:8px; opacity:0.8;">背景画像 (PNG/JPG等)</label>
                    <p style="font-size:0.8rem; opacity:0.7; margin-top:0;">※新しい画像をアップロードすると過去のものは上書きされます</p>
                    <input type="file" id="setting-bg-image" accept="image/*" class="auth-input" style="background:rgba(255,255,255,0.1); color:white;">
                </div>

                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 20px 0;">

                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:8px; opacity:0.8;">アイコン画像 (PNG/JPG)</label>
                    <input type="file" id="setting-icon" accept="image/*" class="auth-input" style="background:rgba(255,255,255,0.1); color:white;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display:block; margin-bottom:8px; opacity:0.8;">アラーム音 (MP3/WAV)</label>
                    <input type="file" id="setting-alarm" accept="audio/*" class="auth-input" style="background:rgba(255,255,255,0.1); color:white;">
                </div>
                
                <button onclick="saveSettings()" class="btn-full" id="save-btn" style="background:var(--accent); color:black;">設定を保存</button>
                <p id="settings-msg" style="color:var(--accent); text-align:center; display:none; font-weight:bold;">保存しました！</p>
            </div>
        </div>
    </div>

    <div id="long-break-modal" class="modal">
        <div class="modal-content">
            <h2 style="font-size: 2.5rem; margin-bottom: 20px;">Long Break ☕</h2>
            <p>4セット(1ポモ)完了お疲れ様です！休憩時間を選んでください。</p>
            <div style="display:flex; gap:15px; margin-top: 30px; justify-content: center;">
                <button class="main-btn" style="background:rgba(255,255,255,0.2); border:none;" onclick="setLongBreak(15)">15分</button>
                <button class="main-btn" style="background:rgba(255,255,255,0.2); border:none;" onclick="setLongBreak(30)">30分</button>
                <button class="main-btn" style="background:rgba(255,255,255,0.2); border:none;" onclick="setLongBreak(60)">60分</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, serverTimestamp, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCZh4ME9QimEx62f7SLc4F3lyorTzml_hY",
            authDomain: "sharetimer-fd215.firebaseapp.com",
            projectId: "sharetimer-fd215",
            storageBucket: "sharetimer-fd215.firebasestorage.app",
            messagingSenderId: "862201995112",
            appId: "1:862201995112:web:2b1b8d6a5cb74eb5d440dd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Global Variables
        window.currentUser = null;
        window.userData = { bgType: "color", bgImageUrl: null, bgWork: "#0f172a", bgBreak: "#064e3b", alarmUrl: null };
        let currentAudio = null;

        // --- Sidebar & Views Navigation ---
        window.toggleSidebar = () => {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
            document.body.classList.toggle('sidebar-active');
        };

        window.switchView = function(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`view-${viewId}`).classList.add('active');
            if(document.getElementById(`nav-${viewId}`)) document.getElementById(`nav-${viewId}`).classList.add('active');
            
            if(viewId === 'history') loadCalendar();
            if(viewId === 'main') loadRanking('today');

            // 画面幅が狭い場合（スマホやタブレット縦画面）は、メニューを選んだらサイドバーを自動で閉じる
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.remove('open');
                document.body.classList.remove('sidebar-active');
            }
        };

        // --- Authentication ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentUser = user;
                // ログイン成功したらサイドバーボタンを表示してメイン画面へ
                document.getElementById('btn-sidebar-toggle').style.display = 'block';
                document.getElementById('nav-user-name').textContent = user.displayName || user.email.split('@')[0];
                switchView('main');
                await loadUserSettings();
                
                // iOS対策のため、タップでAudioロックを解除
                document.addEventListener('touchstart', unlockAudio, { once: true });
                document.addEventListener('click', unlockAudio, { once: true });

                if (Notification.permission === 'default') Notification.requestPermission();
            } else {
                window.currentUser = null;
                document.getElementById('btn-sidebar-toggle').style.display = 'none';
                document.getElementById('sidebar').classList.remove('open');
                switchView('login');
            }
        });

        function unlockAudio() {
            if(!currentAudio) currentAudio = new Audio();
            if(userData.alarmUrl) { currentAudio.src = userData.alarmUrl; }
            currentAudio.play().then(() => currentAudio.pause()).catch(()=>{});
        }

        window.loginWithGoogle = () => signInWithPopup(auth, new GoogleAuthProvider()).catch(e => alert("エラー: " + e.message));

        window.loginWithEmail = async () => {
            const email = document.getElementById('email-input').value;
            const pass = document.getElementById('password-input').value;
            if(!email || !pass) return alert("入力してください");
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                if(e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
                    if(confirm("アカウントが見つかりません。新規作成しますか？")) await createUserWithEmailAndPassword(auth, email, pass);
                } else alert(e.message);
            }
        };

        window.logout = () => signOut(auth);

        // --- User Settings & Background ---
        window.toggleBgSettings = () => {
            const type = document.querySelector('input[name="bg-type"]:checked').value;
            document.getElementById('setting-bg-color-area').style.display = type === 'color' ? 'block' : 'none';
            document.getElementById('setting-bg-image-area').style.display = type === 'image' ? 'block' : 'none';
            // プレビュー用に一時適用
            window.userData.bgType = type;
            applyBgColor(); 
        };

        async function loadUserSettings() {
            const docSnap = await getDoc(doc(db, "users", currentUser.uid));
            if(docSnap.exists()) {
                window.userData = { ...window.userData, ...docSnap.data() };
                
                document.getElementById('setting-name').value = userData.displayName || currentUser.displayName || "";
                document.getElementById('setting-bg-work').value = userData.bgWork || "#0f172a";
                document.getElementById('setting-bg-break').value = userData.bgBreak || "#064e3b";
                
                if(userData.bgType) {
                    document.querySelector(`input[name="bg-type"][value="${userData.bgType}"]`).checked = true;
                }
                toggleBgSettings();

                if(userData.photoURL) document.getElementById('nav-user-icon').src = userData.photoURL;
                if(userData.alarmUrl) {
                    if(!currentAudio) currentAudio = new Audio();
                    currentAudio.src = userData.alarmUrl;
                }
            }
            applyBgColor();
        }

        window.saveSettings = async () => {
            const btn = document.getElementById('save-btn'); 
            btn.textContent = "保存中... (画像の容量により少し時間がかかります)";
            btn.disabled = true;

            const name = document.getElementById('setting-name').value;
            const bgType = document.querySelector('input[name="bg-type"]:checked').value;
            const bgW = document.getElementById('setting-bg-work').value;
            const bgB = document.getElementById('setting-bg-break').value;
            
            const iconFile = document.getElementById('setting-icon').files[0];
            const alarmFile = document.getElementById('setting-alarm').files[0];
            const bgImgFile = document.getElementById('setting-bg-image').files[0];

            let updates = { displayName: name, bgType: bgType, bgWork: bgW, bgBreak: bgB };

            try {
                if(iconFile) {
                    const iconRef = ref(storage, `icons/${currentUser.uid}`);
                    await uploadBytes(iconRef, iconFile);
                    updates.photoURL = await getDownloadURL(iconRef);
                    document.getElementById('nav-user-icon').src = updates.photoURL;
                }
                if(alarmFile) {
                    const alarmRef = ref(storage, `alarms/${currentUser.uid}`);
                    await uploadBytes(alarmRef, alarmFile);
                    updates.alarmUrl = await getDownloadURL(alarmRef);
                    if(!currentAudio) currentAudio = new Audio();
                    currentAudio.src = updates.alarmUrl;
                }
                if(bgImgFile) {
                    // 過去の画像を上書きする形で保存
                    const bgRef = ref(storage, `backgrounds/${currentUser.uid}`);
                    await uploadBytes(bgRef, bgImgFile);
                    updates.bgImageUrl = await getDownloadURL(bgRef);
                }

                await setDoc(doc(db, "users", currentUser.uid), updates, { merge: true });
                window.userData = { ...window.userData, ...updates };
                document.getElementById('nav-user-name').textContent = name;
                
                const msg = document.getElementById('settings-msg'); 
                msg.style.display="block";
                setTimeout(()=>msg.style.display="none", 3000);
            } catch (error) {
                console.error("保存エラー:", error);
                alert("保存中にエラーが発生しました。");
            } finally {
                btn.textContent = "設定を保存";
                btn.disabled = false;
                applyBgColor(); 
            }
        };

        // --- Timer Logic (iOS Safe) ---
        let duration = 25 * 60, timeLeft = 25 * 60, endTime = null, timerId = null, sessions = 1, mode = 'work';
        const timerDisplay = document.getElementById('timer'), startBtn = document.getElementById('start-btn'), seekBar = document.getElementById('seek-bar');
        const statusLabel = document.getElementById('status-label');

        function applyBgColor() {
            document.documentElement.style.setProperty('--bg-work', window.userData.bgWork || "#0f172a");
            document.documentElement.style.setProperty('--bg-break', window.userData.bgBreak || "#064e3b");
            
            if (window.userData.bgType === 'image' && window.userData.bgImageUrl) {
                document.body.style.backgroundImage = `url('${window.userData.bgImageUrl}')`;
                document.body.style.backgroundColor = "transparent";
            } else {
                document.body.style.backgroundImage = "none";
                document.body.style.backgroundColor = (mode === 'work') ? 'var(--bg-work)' : 'var(--bg-break)';
            }
        }

        function updateUI() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            const timeStr = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            timerDisplay.textContent = timeStr;
            seekBar.max = duration; seekBar.value = duration - timeLeft;
            
            for(let i=1; i<=4; i++) {
                document.getElementById(`dot-${i}`).className = (i <= sessions) ? 'dot active' : 'dot';
            }
            const labelText = (statusLabel.textContent === 'READY') ? 'Focus' : statusLabel.textContent;
            document.title = `[${timeStr}] ${labelText}`;
        }

        window.setSet = (n) => { if(!timerId) { sessions = n; updateUI(); } };

        seekBar.oninput = function() {
            timeLeft = duration - parseInt(this.value);
            if (timerId) endTime = Date.now() + (timeLeft * 1000);
            updateUI();
        };

        window.toggleTimer = () => {
            if (timerId) {
                clearInterval(timerId); timerId = null;
                startBtn.textContent = "START";
                startBtn.style.background = "var(--text)";
                startBtn.style.color = "#000";
            } else {
                endTime = Date.now() + (timeLeft * 1000);
                statusLabel.textContent = mode.toUpperCase();
                startBtn.textContent = "PAUSE";
                startBtn.style.background = "white";
                startBtn.style.color = "#000";
                
                // iPad/iOS対応：0.5秒おきの同期
                timerId = setInterval(() => {
                    timeLeft = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
                    updateUI();
                    if(timeLeft <= 0) { 
                        clearInterval(timerId); timerId = null; 
                        startBtn.textContent = "START";
                        startBtn.style.background = "var(--text)";
                        handleEnd(); 
                    }
                }, 500);
            }
        };

        // バックグラウンド復帰時の時間再計算
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible" && timerId && endTime) {
                timeLeft = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
                updateUI();
                if(timeLeft <= 0) { clearInterval(timerId); timerId=null; handleEnd(); }
            }
        });

        window.resetTimer = () => {
            if(timerId) clearInterval(timerId); timerId = null;
            timeLeft = duration; updateUI(); 
            startBtn.textContent = "START"; startBtn.style.background = "var(--text)";
        };

        async function handleEnd() {
            const previousMode = mode;

            // 1. 次のモードへ画面を切り替え＆記録（止まらないように非同期で投げる）
            if (previousMode === 'work') {
                savePomoRecord().catch(e=>console.error(e));
                if (sessions >= 4) {
                    document.getElementById('long-break-modal').style.display = 'flex';
                } else {
                    initBreak(5);
                }
            } else {
                initWork();
            }

            // 2. 音の再生（iOSのブロック回避）
            try {
                if(currentAudio && window.userData.alarmUrl) {
                    currentAudio.currentTime = 0; currentAudio.play();
                } else fallbackBeep();
            } catch(e) { console.warn("Audio blocked"); }

            // 3. 通知
            if (Notification.permission === 'granted') {
                try {
                    const noti = new Notification(
                        previousMode === 'work' ? "作業完了！☕️" : "休憩終了！💻", 
                        { body: "通知をタップして次を開始" }
                    );
                    noti.onclick = function() {
                        window.focus(); this.close();   
                        if (document.getElementById('long-break-modal').style.display !== 'flex') toggleTimer(); 
                    };
                } catch(e) {}
            }
        }

        async function savePomoRecord() {
            if(!currentUser) return;
            await addDoc(collection(db, "pomodoros"), {
                uid: currentUser.uid,
                displayName: window.userData.displayName || currentUser.displayName || "Unknown",
                photoURL: window.userData.photoURL || "https://via.placeholder.com/32",
                timestamp: serverTimestamp()
            });
            if(document.getElementById('view-main').classList.contains('active')) loadRanking('today'); 
        }

        function initWork() { 
            mode='work'; duration=25*60; timeLeft=duration; 
            if(statusLabel.textContent !== 'READY') sessions = (sessions >= 4) ? 1 : sessions + 1;
            applyBgColor(); statusLabel.textContent = "FOCUS"; updateUI(); 
        }

        function initBreak(m) { 
            mode='break'; duration=m*60; timeLeft=duration; 
            applyBgColor();
            if(m >= 15 && window.userData.bgType !== 'image') document.body.style.backgroundColor = 'var(--bg-long)';
            statusLabel.textContent = "BREAK"; updateUI(); 
        }

        window.setLongBreak = (m) => { document.getElementById('long-break-modal').style.display='none'; sessions = 4; initBreak(m); }

        function fallbackBeep() {
            const ctx=new (window.AudioContext || window.webkitAudioContext)(), osc=ctx.createOscillator(), g=ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value=880; g.gain.linearRampToValueAtTime(0.5, ctx.currentTime+0.1);
            g.gain.linearRampToValueAtTime(0, ctx.currentTime+1);
            osc.start(); osc.stop(ctx.currentTime+1);
        }

        // --- Ranking ---
        window.loadRanking = async (filter) => {
            const listEl = document.getElementById('ranking-list');
            listEl.innerHTML = "読込中...";
            
            let startTime = new Date(); startTime.setHours(0,0,0,0); 
            if(filter === 'yesterday') { startTime.setDate(startTime.getDate()-1); }
            if(filter === 'weekly') { startTime.setDate(startTime.getDate()-7); }
            
            let endTime = new Date(startTime);
            if(filter === 'yesterday') { endTime.setDate(endTime.getDate()+1); }
            else { endTime = new Date(); }

            const q = query(collection(db, "pomodoros"), where("timestamp", ">=", startTime), where("timestamp", "<", endTime));

            try {
                const snap = await getDocs(q);
                const counts = {}; const info = {};
                snap.forEach(d => {
                    const data = d.data();
                    counts[data.uid] = (counts[data.uid] || 0) + 1;
                    info[data.uid] = { name: data.displayName, icon: data.photoURL };
                });

                const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
                if(sorted.length === 0) return listEl.innerHTML = "<div style='opacity:0.5;text-align:center;'>記録なし</div>";

                listEl.innerHTML = sorted.map(([uid, c]) => `
                    <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.1);">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="${info[uid].icon}" style="width:24px; height:24px; border-radius:50%; object-fit:cover;">
                            <span>${info[uid].name}</span>
                        </div>
                        <span style="color:var(--accent); font-weight:bold;">${c} ポモ</span>
                    </div>
                `).join('');
            } catch (error) {
                console.error(error); listEl.innerHTML = "<div style='color:red;'>取得エラー(F12参照)</div>";
            }
        };

        // --- Calendar (History) ---
        let calendarInstance = null;
        async function loadCalendar() {
            if(!currentUser) return;
            const snap = await getDocs(query(collection(db, "pomodoros"), where("uid", "==", currentUser.uid)));
            const counts = {};
            snap.forEach(d => {
                const data = d.data();
                if(data.timestamp) {
                    const date = data.timestamp.toDate();
                    const key = date.getFullYear() + "-" + ("0"+(date.getMonth()+1)).slice(-2) + "-" + ("0"+date.getDate()).slice(-2);
                    counts[key] = (counts[key] || 0) + 1;
                }
            });

            const events = Object.keys(counts).map(date => ({
                title: `${counts[date]} ポモ`, start: date, allDay: true, backgroundColor: '#38bdf8', borderColor: '#38bdf8', textColor: '#000'
            }));

            const calendarEl = document.getElementById('calendar');
            if(calendarInstance) calendarInstance.destroy();
            calendarInstance = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth', locale: 'ja', events: events, height: 'auto'
            });
            calendarInstance.render();
        }

        updateUI();
    </script>
</body>
</html>
