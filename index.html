<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SharePomo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>🍅 SharePomo</h1>
    <nav>
      <button data-route="timer">タイマー</button>
      <button data-route="history">履歴</button>
      <button data-route="settings">設定</button>
      <button data-route="auth" id="authNav">ログイン</button>
    </nav>
  </header>

  <main>
    <section id="auth" class="page hidden">
      <h2>ログイン / 新規登録</h2>
      <div class="card">
        <input id="email" type="email" placeholder="メールアドレス" />
        <input id="password" type="password" placeholder="パスワード" />
        <input id="displayName" type="text" placeholder="ユーザー名（新規登録時）" />
        <input id="iconUpload" type="file" accept="image/*" />
        <div class="row">
          <button id="signupBtn">新規登録</button>
          <button id="loginBtn">メールでログイン</button>
        </div>
        <button id="googleBtn" class="full">Googleでログイン</button>
      </div>
    </section>

    <section id="timer" class="page">
      <div id="modeBadge" class="badge work">作業中</div>
      <div id="setText" class="setText">セット 1 / 4</div>
      <div id="dots" class="dots"></div>
      <div id="clock" class="clock">25:00</div>
      <input id="seek" type="range" min="0" max="1500" value="0" step="1" />
      <div class="controls">
        <button id="startPause">START</button>
        <button id="resetBtn">RESET</button>
      </div>
      <div class="stats">
        <p>完了ポモ数: <span id="pomoCount">0</span></p>
      </div>

      <div class="card">
        <h3>ランキング</h3>
        <div class="tabs">
          <button class="rankTab active" data-rank="today">今日</button>
          <button class="rankTab" data-rank="yesterday">昨日</button>
          <button class="rankTab" data-rank="week">週間</button>
        </div>
        <ol id="rankingList"></ol>
      </div>
    </section>

    <section id="settings" class="page hidden">
      <h2>設定</h2>
      <div class="card">
        <label>長い休憩時間
          <select id="longBreakSelect">
            <option value="900">15分</option>
            <option value="1800">30分</option>
            <option value="3600">60分</option>
          </select>
        </label>
        <label>アラーム音アップロード
          <input id="alarmUpload" type="file" accept="audio/*" />
        </label>
        <label>背景テーマ
          <select id="themeSelect">
            <option value="default">Default</option>
            <option value="calm">Calm</option>
            <option value="dark">Dark</option>
          </select>
        </label>
      </div>
    </section>

    <section id="history" class="page hidden">
      <h2>作業履歴</h2>
      <div class="card">
        <input id="historyDate" type="date" />
        <p><span id="historyCount">0</span> ポモ完了</p>
      </div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
