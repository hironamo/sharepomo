<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Connect Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <style>
        :root {
            --bg-work: #0f172a; --bg-break: #064e3b; --bg-long: #1e3a8a;
            --accent: #38bdf8; --text: #f8fafc; --sidebar-bg: rgba(0,0,0,0.85);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; display: flex; height: 100vh; background-color: var(--bg-work); 
            color: var(--text); font-family: -apple-system, sans-serif; 
            transition: background-color 0.8s; overflow: hidden;
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        /* --- Sidebar & Layout --- */
        #sidebar {
            width: 300px; height: 100%; background: var(--sidebar-bg); backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column;
            position: fixed; left: -300px; transition: 0.3s ease; z-index: 1000; overflow-y: auto;
        }
        #sidebar.open { left: 0; }
        
        .sidebar-toggle {
            position: fixed; top: 15px; left: 15px; z-index: 1001; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 15px;
            border-radius: 8px; cursor: pointer; font-size: 1.2rem; backdrop-filter: blur(5px);
        }

        #main-content {
            flex: 1; display: flex; flex-direction: column; position: relative;
            width: 100%; transition: margin-left 0.3s ease;
        }
        @media (min-width: 768px) {
            body.sidebar-active #main-content { margin-left: 300px; }
        }

        .sidebar-content { padding: 70px 20px 20px; display: flex; flex-direction: column; gap: 20px; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-icon { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #555; }
        
        .nav-btn {
            background: rgba(255,255,255,0.1); border: none; color: white; padding: 12px;
            border-radius: 8px; text-align: left; cursor: pointer; transition: 0.2s;
        }
        .nav-btn:hover, .nav-btn.active { background: var(--accent); color: black; font-weight: bold; }

        /* --- Party Mode UI --- */
        .party-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .party-input { width: 100%; padding: 10px; text-align: center; font-size: 1.2rem; letter-spacing: 5px; margin-bottom: 10px; border-radius: 6px; border: none; }

        /* --- Views --- */
        .view { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; padding: 20px; overflow-y: auto;}
        .view.active { display: flex; }

        /* --- Timer UI --- */
        #status-label { letter-spacing: 0.3rem; opacity: 0.8; margin-bottom: 10px; font-size: 1.5rem; font-weight: bold;}
        .session-dots { display: flex; gap: 15px; margin-bottom: 20px; }
        .dot { width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s; }
        .dot.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        #timer { font-size: clamp(5rem, 20vw, 12rem); font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        
        .progress-container { width: 90%; max-width: 600px; margin: 30px 0; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 4px; outline: none; cursor: pointer; accent-color: var(--accent); }
        
        .controls { display: flex; gap: 20px; }
        .main-btn { padding: 1rem 2.5rem; font-size: 1.2rem; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-start { background: var(--text); color: #000; min-width: 160px; }
        .btn-reset { background: rgba(255,255,255,0.2); color: white; }

        /* --- Components --- */
        .glass-card { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); }
        .auth-input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: none; }
        .btn-full { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
        
        /* Modals & Calendar */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-work); padding: 30px; border-radius: 15px; text-align: center; border: 1px solid var(--accent); }
        #calendar-wrapper { width: 100%; max-width: 800px; background: white; color: black; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body class="sidebar-active">

    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

    <div id="sidebar" class="open">
        <div class="sidebar-content">
            <div class="user-info">
                <img id="side-user-icon" class="user-icon" src="https://via.placeholder.com/45" alt="icon">
                <div>
                    <div id="side-user-name" style="font-weight: bold;">Guest</div>
                    <div style="font-size: 0.8rem; opacity: 0.7; cursor: pointer;" onclick="logout()">ログアウト</div>
                </div>
            </div>

            <div class="party-box">
                <h3 style="margin-top:0; font-size:1rem;">👥 パーティモード</h3>
                <div id="party-join-view">
                    <input type="number" id="room-code" class="party-input" placeholder="3桁の数字">
                    <button class="btn-full" style="background: var(--accent); color: black;" onclick="joinRoom()">部屋を作成 / 参加</button>
                </div>
                <div id="party-active-view" style="display:none; text-align:center;">
                    <p style="margin:0; opacity:0.8; font-size:0.9rem;">現在のルーム</p>
                    <div id="room-display" style="font-size:2rem; font-weight:bold; color:var(--accent); letter-spacing:5px;">---</div>
                    <p id="party-status" style="font-size:0.8rem; color:#4ade80;">同期中</p>
                    <button class="btn-full" style="background: rgba(255,0,0,0.2); color: #ff6b6b;" onclick="leaveRoom()">退出する</button>
                </div>
            </div>

            <nav style="display: flex; flex-direction: column; gap: 10px;">
                <button class="nav-btn active" onclick="switchView('main')" id="nav-main">⏱ タイマー</button>
                <button class="nav-btn" onclick="switchView('history')" id="nav-history">📅 履歴カレンダー</button>
                <button class="nav-btn" onclick="switchView('settings')" id="nav-settings">⚙ 設定</button>
            </nav>

            <div class="party-box" style="flex:1;">
                <h3 style="margin-top:0; font-size:1rem;">👑 ランキング</h3>
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <button onclick="loadRanking('today')" class="btn-full" style="padding:5px; margin:0; background:rgba(255,255,255,0.1); color:white;">今日</button>
                    <button onclick="loadRanking('weekly')" class="btn-full" style="padding:5px; margin:0; background:rgba(255,255,255,0.1); color:white;">週間</button>
                </div>
                <div id="ranking-list" style="font-size: 0.9rem; max-height: 150px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <div id="view-login" class="view active">
            <div class="glass-card" style="text-align: center;">
                <h2>Focus Connect Pro</h2>
                <input type="email" id="email-input" class="auth-input" placeholder="メールアドレス">
                <input type="password" id="password-input" class="auth-input" placeholder="パスワード">
                <button onclick="loginWithEmail()" class="btn-full" style="background: var(--accent); color: black;">登録 / ログイン</button>
                <p style="opacity: 0.7;">or</p>
                <button onclick="loginWithGoogle()" class="btn-full" style="background: white; color: black;">Googleでログイン</button>
            </div>
        </div>

        <div id="view-main" class="view">
            <div id="status-label">READY</div>
            <div class="session-dots">
                <div class="dot active" id="dot-1" onclick="jumpSession(1)"></div>
                <div class="dot" id="dot-2" onclick="jumpSession(2)"></div>
                <div class="dot" id="dot-3" onclick="jumpSession(3)"></div>
                <div class="dot" id="dot-4" onclick="jumpSession(4)"></div>
            </div>
            <div id="timer">25:00</div>
            <div class="progress-container"><input type="range" id="seek-bar" value="0"></div>
            <div class="controls">
                <button class="main-btn btn-reset" onclick="resetTimer()">Reset</button>
                <button class="main-btn btn-start" id="start-btn" onclick="toggleTimer()">START</button>
            </div>
        </div>

        <div id="view-history" class="view">
            <h2 style="text-shadow: 0 2px 5px rgba(0,0,0,0.5);">作業履歴</h2>
            <div id="calendar-wrapper"><div id="calendar"></div></div>
        </div>

        <div id="view-settings" class="view">
            <div class="glass-card">
                <h2 style="margin-top:0;">設定</h2>
                <label style="font-size:0.9rem; opacity:0.8;">ユーザー名</label>
                <input type="text" id="setting-name" class="auth-input" style="background:rgba(255,255,255,0.9);">
                
                <label style="font-size:0.9rem; opacity:0.8; display:block; margin-top:10px;">背景画像のURL (お好きな画像)</label>
                <input type="url" id="setting-bg-url" class="auth-input" style="background:rgba(255,255,255,0.9);" placeholder="https://...">

                <label style="font-size:0.9rem; opacity:0.8; display:block; margin-top:10px;">アイコン画像</label>
                <input type="file" id="setting-icon" accept="image/*" class="auth-input" style="background:rgba(255,255,255,0.1); color:white;">
                
                <label style="font-size:0.9rem; opacity:0.8; display:block; margin-top:10px;">アラーム音</label>
                <input type="file" id="setting-alarm" accept="audio/*" class="auth-input" style="background:rgba(255,255,255,0.1); color:white;">
                
                <button onclick="saveSettings()" class="btn-full" style="background:var(--accent); color:black; margin-top:20px;">設定を保存</button>
            </div>
        </div>
    </div>

    <div id="long-break-modal" class="modal">
        <div class="modal-content">
            <h2 style="font-size: 2rem; margin-top:0;">☕️ 長めの休憩</h2>
            <p>4セット完了お疲れ様です！休憩時間を選んでください。</p>
            <div style="display:flex; gap:10px; margin-top: 20px; justify-content: center;">
                <button class="main-btn" style="background:rgba(255,255,255,0.2); color:white;" onclick="setLongBreak(15)">15分</button>
                <button class="main-btn" style="background:rgba(255,255,255,0.2); color:white;" onclick="setLongBreak(30)">30分</button>
                <button class="main-btn" style="background:rgba(255,255,255,0.2); color:white;" onclick="setLongBreak(60)">60分</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp, doc, setDoc, getDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZh4ME9QimEx62f7SLc4F3lyorTzml_hY",
            authDomain: "sharetimer-fd215.firebaseapp.com",
            projectId: "sharetimer-fd215",
            storageBucket: "sharetimer-fd215.firebasestorage.app",
            messagingSenderId: "862201995112",
            appId: "1:862201995112:web:2b1b8d6a5cb74eb5d440dd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Global State
        window.currentUser = null;
        window.userData = { bgUrl: "", bgWork: "#0f172a", bgBreak: "#064e3b", alarmUrl: null, name: "Guest" };
        let currentAudio = new Audio();
        
        // Timer State
        let duration = 25 * 60, timeLeft = 25 * 60, endTime = null, timerId = null;
        let sessions = 1, mode = 'work'; // 'work' | 'break'
        
        // Party Mode State
        let currentRoomId = null;
        let unsubscribeRoom = null;

        // --- Sidebar & Navigation ---
        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('open');
            document.body.classList.toggle('sidebar-active');
        };

        window.switchView = (viewId) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            if(document.getElementById(`nav-${viewId}`)) document.getElementById(`nav-${viewId}`).classList.add('active');
            
            if(viewId === 'history') loadCalendar();
            if(viewId === 'main') loadRanking('today');
            
            // モバイル時はビュー移動でサイドバーを閉じる
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.remove('open');
                document.body.classList.remove('sidebar-active');
            }
        };

        // --- Auth & Init ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentUser = user;
                document.getElementById('sidebar').style.display = 'flex';
                switchView('main');
                await loadUserSettings();
                if (Notification.permission === 'default') Notification.requestPermission();
                
                // iOS対策: 初回タップでAudioをアクティブ化
                document.body.addEventListener('touchstart', unlockAudio, { once: true });
                document.body.addEventListener('click', unlockAudio, { once: true });
            } else {
                window.currentUser = null;
                document.getElementById('sidebar').style.display = 'none';
                switchView('login');
            }
        });

        function unlockAudio() {
            if(userData.alarmUrl) { currentAudio.src = userData.alarmUrl; }
            currentAudio.play().then(() => currentAudio.pause()).catch(()=>{});
        }

        // --- User Settings ---
        async function loadUserSettings() {
            const docSnap = await getDoc(doc(db, "users", currentUser.uid));
            if(docSnap.exists()) {
                window.userData = { ...window.userData, ...docSnap.data() };
            } else {
                window.userData.name = currentUser.displayName || currentUser.email.split('@')[0];
            }
            
            // UI更新
            document.getElementById('setting-name').value = userData.name;
            document.getElementById('side-user-name').textContent = userData.name;
            document.getElementById('setting-bg-url').value = userData.bgUrl || "";
            if(userData.photoURL) document.getElementById('side-user-icon').src = userData.photoURL;
            if(userData.alarmUrl) currentAudio.src = userData.alarmUrl;
            
            applyVisuals();
        }

        window.saveSettings = async () => {
            const name = document.getElementById('setting-name').value;
            const bgUrl = document.getElementById('setting-bg-url').value;
            const iconFile = document.getElementById('setting-icon').files[0];
            const alarmFile = document.getElementById('setting-alarm').files[0];

            let updates = { name: name, bgUrl: bgUrl };

            if(iconFile) {
                const iconRef = ref(storage, `icons/${currentUser.uid}`);
                await uploadBytes(iconRef, iconFile);
                updates.photoURL = await getDownloadURL(iconRef);
            }
            if(alarmFile) {
                const alarmRef = ref(storage, `alarms/${currentUser.uid}`);
                await uploadBytes(alarmRef, alarmFile);
                updates.alarmUrl = await getDownloadURL(alarmRef);
            }

            await setDoc(doc(db, "users", currentUser.uid), updates, { merge: true });
            alert("設定を保存しました！");
            await loadUserSettings();
        };

        function applyVisuals() {
            // 背景画像が設定されていれば適用、なければ色
            if (userData.bgUrl) {
                document.body.style.backgroundImage = `url('${userData.bgUrl}')`;
            } else {
                document.body.style.backgroundImage = 'none';
                document.body.style.backgroundColor = (mode === 'work') ? userData.bgWork : userData.bgBreak;
            }
        }

        // --- Party Mode Logic ---
        window.joinRoom = async () => {
            const code = document.getElementById('room-code').value;
            if(code.length !== 3) return alert("3桁の数字を入力してください");
            
            currentRoomId = code;
            document.getElementById('party-join-view').style.display = 'none';
            document.getElementById('party-active-view').style.display = 'block';
            document.getElementById('room-display').textContent = code;

            const roomRef = doc(db, "rooms", currentRoomId);
            const roomSnap = await getDoc(roomRef);
            
            // 部屋がなければ初期化
            if(!roomSnap.exists()) {
                await setDoc(roomRef, { status: 'idle', mode: 'work', sessions: 1, duration: 25*60, endTime: 0, timeLeft: 25*60 });
            }

            // 同期リスナー開始
            if(unsubscribeRoom) unsubscribeRoom();
            unsubscribeRoom = onSnapshot(roomRef, (doc) => {
                if (doc.exists()) syncTimerWithRoom(doc.data());
            });
        };

        window.leaveRoom = () => {
            if(unsubscribeRoom) unsubscribeRoom();
            currentRoomId = null;
            document.getElementById('party-join-view').style.display = 'block';
            document.getElementById('party-active-view').style.display = 'none';
            resetTimer();
        };

        function syncTimerWithRoom(data) {
            mode = data.mode;
            sessions = data.sessions;
            duration = data.duration;
            
            if (data.status === 'running') {
                const now = Date.now();
                timeLeft = Math.max(0, Math.ceil((data.endTime - now) / 1000));
                if (!timerId && timeLeft > 0) {
                    endTime = data.endTime;
                    startLocalTimer();
                }
            } else {
                stopLocalTimer();
                timeLeft = data.timeLeft !== undefined ? data.timeLeft : duration;
            }
            updateUI();
        }

        // --- Timer Core Logic (iOS safe) ---
        window.requestToggle = async () => {
            if (currentRoomId) {
                // パーティモード: サーバーの状態を更新 (全員が同期する)
                const roomRef = doc(db, "rooms", currentRoomId);
                if (timerId) {
                    await updateDoc(roomRef, { status: 'idle', timeLeft: timeLeft });
                } else {
                    const serverEndTime = Date.now() + (timeLeft * 1000);
                    await updateDoc(roomRef, { status: 'running', endTime: serverEndTime, mode: mode, sessions: sessions, duration: duration });
                }
            } else {
                // ローカルモード
                toggleTimer();
            }
        };

        window.toggleTimer = () => {
            if (timerId) {
                stopLocalTimer();
            } else {
                endTime = Date.now() + (timeLeft * 1000);
                startLocalTimer();
            }
        };

        function startLocalTimer() {
            if(timerId) clearInterval(timerId);
            document.getElementById('start-btn').textContent = "PAUSE";
            document.getElementById('start-btn').style.background = "white";
            
            timerId = setInterval(() => {
                timeLeft = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
                updateUI();
                if(timeLeft <= 0) { 
                    stopLocalTimer();
                    handleEnd(); 
                }
            }, 500); // iOS対策のため0.5秒おきにチェック
        }

        function stopLocalTimer() {
            if(timerId) clearInterval(timerId);
            timerId = null;
            document.getElementById('start-btn').textContent = "START";
            document.getElementById('start-btn').style.background = "var(--accent)";
        }

        // iOS対策: バックグラウンド復帰時に時間を再計算
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                if (currentRoomId) {
                    getDoc(doc(db, "rooms", currentRoomId)).then(snap => {
                        if(snap.exists()) syncTimerWithRoom(snap.data());
                    });
                } else if (timerId && endTime) {
                    timeLeft = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
                    updateUI();
                    if(timeLeft <= 0) { stopLocalTimer(); handleEnd(); }
                }
            }
        });

        // 終了時の処理 (iOSでブロックされない順序)
        async function handleEnd() {
            const previousMode = mode;
            
            // 1. 次のモードへUI・変数を移行（すぐに画面を切り替える）
            if (previousMode === 'work') {
                if (sessions >= 4) {
                    if(!currentRoomId) document.getElementById('long-break-modal').style.display = 'flex';
                    else setMode('break', 30*60, 1); // パーティ時は自動で30分
                } else {
                    setMode('break', 5*60, sessions);
                }
                // Firestoreへの記録は裏で行う(awaitしない)
                savePomoRecord().catch(e => console.error("Save Error:", e));
            } else {
                setMode('work', 25*60, (sessions >= 4 ? 1 : sessions + 1));
            }

            // 2. 音声再生 (iOSエラー回避のtry-catch)
            try {
                if(userData.alarmUrl) {
                    currentAudio.currentTime = 0; currentAudio.play();
                } else {
                    fallbackBeep();
                }
            } catch(e) { console.warn("Audio blocked"); }

            // 3. 通知
            if (Notification.permission === 'granted') {
                try {
                    const noti = new Notification(previousMode === 'work' ? "お疲れ様です！" : "作業開始！", { body: "クリックして次へ" });
                    noti.onclick = () => { window.focus(); noti.close(); if(!timerId) requestToggle(); };
                } catch(e) {}
            }
        }

        function setMode(newMode, newDuration, newSession) {
            mode = newMode; duration = newDuration; timeLeft = duration; sessions = newSession;
            updateUI();
            if(currentRoomId) {
                updateDoc(doc(db, "rooms", currentRoomId), { status: 'idle', mode: mode, sessions: sessions, duration: duration, timeLeft: timeLeft });
            }
        }

        window.resetTimer = () => { stopLocalTimer(); setMode('work', 25*60, 1); };
        window.jumpSession = (s) => { if(!timerId) setMode(mode, duration, s); };
        window.setLongBreak = (m) => { document.getElementById('long-break-modal').style.display='none'; setMode('break', m*60, 4); };

        function updateUI() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
            document.getElementById('status-label').textContent = mode.toUpperCase();
            document.title = `[${m}:${s.toString().padStart(2,'0')}] Focus Pro`;
            
            const sb = document.getElementById('seek-bar');
            sb.max = duration; sb.value = duration - timeLeft;
            
            for(let i=1; i<=4; i++) {
                document.getElementById(`dot-${i}`).className = (i <= sessions) ? 'dot active' : 'dot';
            }
            applyVisuals();
        }

        document.getElementById('seek-bar').addEventListener('input', (e) => {
            timeLeft = duration - e.target.value; updateUI();
        });
        document.getElementById('seek-bar').addEventListener('change', () => {
            if(timerId) endTime = Date.now() + (timeLeft * 1000);
            if(currentRoomId) updateDoc(doc(db, "rooms", currentRoomId), { timeLeft: timeLeft });
        });

        // --- Database & Ranking ---
        async function savePomoRecord() {
            if(!currentUser) return;
            await addDoc(collection(db, "pomodoros"), {
                uid: currentUser.uid,
                displayName: userData.name,
                photoURL: userData.photoURL || "https://via.placeholder.com/32",
                timestamp: serverTimestamp()
            });
            if(document.getElementById('view-main').classList.contains('active')) loadRanking('today');
        }

        window.loadRanking = async (filter) => {
            const listEl = document.getElementById('ranking-list');
            listEl.innerHTML = "読込中...";
            
            let startTime = new Date(); startTime.setHours(0,0,0,0);
            if(filter === 'weekly') startTime.setDate(startTime.getDate()-7);
            
            const q = query(collection(db, "pomodoros"), where("timestamp", ">=", startTime));
            const snap = await getDocs(q);
            const counts = {}; const info = {};
            
            snap.forEach(d => {
                const data = d.data();
                counts[data.uid] = (counts[data.uid] || 0) + 1;
                info[data.uid] = { name: data.displayName, icon: data.photoURL };
            });

            const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
            if(sorted.length === 0) return listEl.innerHTML = "<div style='opacity:0.5;text-align:center;'>記録なし</div>";

            listEl.innerHTML = sorted.map(([uid, c]) => `
                <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.1);">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${info[uid].icon}" style="width:24px; height:24px; border-radius:50%; object-fit:cover;">
                        <span>${info[uid].name}</span>
                    </div>
                    <span style="color:var(--accent); font-weight:bold;">${c} ポモ</span>
                </div>
            `).join('');
        };

        let cal = null;
        async function loadCalendar() {
            const snap = await getDocs(query(collection(db, "pomodoros"), where("uid", "==", currentUser.uid)));
            const events = snap.docs.map(d => ({ title: "🍅1ポモ", start: d.data().timestamp?.toDate(), color: '#38bdf8' }));
            if(!cal) cal = new FullCalendar.Calendar(document.getElementById('calendar'), { initialView: 'dayGridMonth', events, height: 'auto' });
            else { cal.removeAllEvents(); cal.addEventSource(events); }
            setTimeout(() => cal.render(), 100);
        }

        // --- Auth Functions ---
        window.loginWithEmail = async () => {
            const e = document.getElementById('email-input').value, p = document.getElementById('password-input').value;
            try { await signInWithEmailAndPassword(auth, e, p); }
            catch { await createUserWithEmailAndPassword(auth, e, p); }
        };
        window.loginWithGoogle = () => signInWithPopup(auth, new GoogleAuthProvider());
        window.logout = () => signOut(auth);

        function fallbackBeep() {
            const ctx=new (window.AudioContext || window.webkitAudioContext)(), osc=ctx.createOscillator(), g=ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value=880; g.gain.linearRampToValueAtTime(0.5, ctx.currentTime+0.1);
            g.gain.linearRampToValueAtTime(0, ctx.currentTime+1);
            osc.start(); osc.stop(ctx.currentTime+1);
        }
        updateUI();
    </script>
</body>
</html>
