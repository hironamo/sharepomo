<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SharePomo</title>
  <style>
    :root { --bg-work:#0f172a; --bg-break:#064e3b; --bg-long:#1e3a8a; --accent:#38bdf8; --text:#f8fafc; }
    body { margin:0; display:flex; height:100vh; background-color:var(--bg-work); color:var(--text); font-family:-apple-system,sans-serif; transition:background-color .8s; overflow:hidden; }
    body.custom-bg { background-size:cover; background-position:center; background-repeat:no-repeat; background-attachment:fixed; }
    #side-panel { width:280px; height:100%; background:rgba(0,0,0,.4); backdrop-filter:blur(25px); border-right:1px solid rgba(255,255,255,.1); display:flex; flex-direction:column; z-index:50; }
    .panel-section { padding:20px; flex:1; overflow-y:auto; }
    h3 { font-size:.9rem; letter-spacing:.1rem; border-bottom:1px solid var(--accent); padding-bottom:8px; margin:0 0 15px; }
    .tab-container { display:flex; gap:4px; background:rgba(255,255,255,.1); padding:4px; border-radius:8px; margin-bottom:15px; }
    .tab-btn { flex:1; border:none; background:none; color:white; padding:8px 0; font-size:.7rem; cursor:pointer; border-radius:6px; opacity:.5; }
    .tab-btn.active { background:var(--accent); color:#000; opacity:1; font-weight:bold; }
    .ranking-item { display:flex; justify-content:space-between; padding:10px 0; font-size:.85rem; border-bottom:1px solid rgba(255,255,255,.05); }
    #main-content { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; text-align:center; }
    #user-config { position:absolute; top:20px; left:20px; z-index:60; display:flex; align-items:center; gap:8px; flex-wrap:wrap; max-width:95%; }
    .session-dots { display:flex; gap:5px; margin-bottom:1rem; z-index:70; }
    .dot-wrapper { padding:15px; cursor:pointer; }
    .dot { width:14px; height:14px; border-radius:50%; background:rgba(255,255,255,.2); }
    .dot.active { background:var(--accent); box-shadow:0 0 15px var(--accent); }
    #timer { font-size:18vw; font-weight:800; font-variant-numeric:tabular-nums; line-height:1; }
    .progress-container { width:70%; max-width:500px; margin:2rem 0; }
    input[type="range"] { width:100%; -webkit-appearance:none; background:rgba(255,255,255,.1); height:8px; border-radius:4px; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:24px; height:24px; background:white; border-radius:50%; }
    .controls { display:flex; gap:1.5rem; }
    button.main-btn, .small-btn, input, select { background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.3); color:white; padding:8px 12px; border-radius:8px; }
    button.main-btn { padding:1.2rem 2.5rem; font-size:1.1rem; border-radius:100px; cursor:pointer; font-weight:bold; }
    #start-btn { background:var(--text); color:#000; min-width:140px; }
    #long-break-modal, #auth-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.95); align-items:center; justify-content:center; z-index:100; }
    .auth-card { width:min(480px,90vw); padding:24px; border-radius:16px; background:#111827; border:1px solid rgba(255,255,255,.2); }
  </style>
</head>
<body>
<audio id="alarm-sound" src="omedetou.mp3" preload="auto"></audio>
<div id="auth-modal"><div class="auth-card">
  <h2>ログイン</h2>
  <p>メール/Googleでサインインしてください。</p>
  <input id="email" type="email" placeholder="email" style="width:100%;margin-bottom:8px;">
  <input id="password" type="password" placeholder="password" style="width:100%;margin-bottom:8px;">
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <button class="small-btn" id="email-login-btn">メールログイン</button>
    <button class="small-btn" id="email-signup-btn">新規登録</button>
    <button class="small-btn" id="google-login-btn">Googleログイン</button>
  </div>
  <p id="auth-msg"></p>
</div></div>
<div id="side-panel"><div class="panel-section">
  <h3>🏆 RANKING</h3>
  <div class="tab-container"><button onclick="changeFilter('today')" id="btn-today" class="tab-btn active">今日</button><button onclick="changeFilter('yesterday')" id="btn-yesterday" class="tab-btn">昨日</button><button onclick="changeFilter('weekly')" id="btn-weekly" class="tab-btn">週間</button></div>
  <div id="ranking-list">読み込み中...</div><p id="sync-status">未ログイン</p>
</div></div>
<div id="main-content">
  <div id="user-config">
    <input type="text" id="user-name" placeholder="表示名">
    <input type="text" id="icon-url" placeholder="アイコンURL(任意)">
    <button class="small-btn" id="save-profile-btn">プロフィール保存</button>
    <button class="small-btn" onclick="location.href='history.html'">履歴</button>
    <button class="small-btn" id="logout-btn">ログアウト</button>
  </div>
  <div id="status-label" style="letter-spacing:.3rem;opacity:.7;margin:20px 0 5px;">READY</div>
  <div class="session-dots"><div class="dot-wrapper" onclick="setSet(1)"><div class="dot"></div></div><div class="dot-wrapper" onclick="setSet(2)"><div class="dot"></div></div><div class="dot-wrapper" onclick="setSet(3)"><div class="dot"></div></div><div class="dot-wrapper" onclick="setSet(4)"><div class="dot"></div></div></div>
  <div id="timer">25:00</div><div class="progress-container"><input type="range" id="seek-bar" value="0"></div>
  <div class="controls"><button class="main-btn" onclick="location.reload()">Reset</button><button class="main-btn" id="start-btn">START</button></div>
</div>
<div id="long-break-modal"><div><h2>Long Break</h2><button class="main-btn" onclick="setLongBreak(15)">15分</button><button class="main-btn" onclick="setLongBreak(30)">30分</button><button class="main-btn" onclick="setLongBreak(60)">60分</button></div></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, query, orderBy, getDocs, serverTimestamp, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyCZh4ME9QimEx62f7SLc4F3lyorTzml_hY",authDomain:"sharetimer-fd215.firebaseapp.com",projectId:"sharetimer-fd215",storageBucket:"sharetimer-fd215.firebasestorage.app",messagingSenderId:"862201995112",appId:"1:862201995112:web:2b1b8d6a5cb74eb5d440dd",measurementId:"G-2DKH6Y8R4C"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app); const provider=new GoogleAuthProvider();
let currentUser=null, duration=1500,timeLeft=1500,endTime=null,timerId=null,sessions=1,mode='work',currentFilter='today',workStartedAt=null;
const timerDisplay=document.getElementById('timer'),startBtn=document.getElementById('start-btn'),seekBar=document.getElementById('seek-bar'),statusLabel=document.getElementById('status-label');
const dots=document.querySelectorAll('.dot'),syncStatus=document.getElementById('sync-status'),authModal=document.getElementById('auth-modal'),authMsg=document.getElementById('auth-msg');
const userNameInput=document.getElementById('user-name'), iconInput=document.getElementById('icon-url');
function updateUI(){const m=Math.floor(timeLeft/60),s=timeLeft%60; timerDisplay.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; seekBar.max=duration; seekBar.value=duration-timeLeft; dots.forEach((d,i)=>d.classList.toggle('active',i<sessions));}
function setSet(n){sessions=n; updateUI();} window.setSet=setSet;
seekBar.oninput=function(){timeLeft=duration-parseInt(this.value,10); if(timerId) endTime=Date.now()+timeLeft*1000; updateUI();};
function startCountdown(){if(mode==='work'&&!workStartedAt)workStartedAt=new Date(); endTime=Date.now()+timeLeft*1000; timerId=setInterval(()=>{timeLeft=Math.max(0,Math.ceil((endTime-Date.now())/1000)); updateUI(); if(timeLeft<=0){clearInterval(timerId); timerId=null; handleEnd(); startBtn.textContent='START';}},200); startBtn.textContent='PAUSE';}
startBtn.onclick=()=>timerId?(clearInterval(timerId),timerId=null,startBtn.textContent='START'):startCountdown();
async function saveSession(){if(!currentUser||!workStartedAt)return; const endedAt=new Date(); await addDoc(collection(db,'sessions'),{userId:currentUser.uid,displayName:currentUser.displayName||'NoName',photoURL:currentUser.photoURL||'',startAt:workStartedAt.toISOString(),endAt:endedAt.toISOString(),pomos:1,createdAt:serverTimestamp()}); workStartedAt=null; syncStatus.textContent='1ポモ保存しました';}
async function fetchRanking(){const snap=await getDocs(query(collection(db,'sessions'),orderBy('startAt','desc'))); const now=new Date(),today=now.toDateString(),y=new Date(now); y.setDate(now.getDate()-1); const ys=y.toDateString(),week=new Date(now); week.setDate(now.getDate()-7); const counts={}; snap.forEach(d=>{const r=d.data(); const dt=new Date(r.startAt); const n=r.displayName||'Unknown'; if((currentFilter==='today'&&dt.toDateString()===today)||(currentFilter==='yesterday'&&dt.toDateString()===ys)||(currentFilter==='weekly'&&dt>week)){counts[n]=(counts[n]||0)+(r.pomos||1);}}); const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1); document.getElementById('ranking-list').innerHTML=sorted.length?sorted.map(([n,c])=>`<div class='ranking-item'><span>${n}</span><span>${c} ポモ</span></div>`).join(''):'記録なし';}
function changeFilter(filter){currentFilter=filter; document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('btn-'+filter).classList.add('active'); fetchRanking();} window.changeFilter=changeFilter;
async function handleEnd(){document.getElementById('alarm-sound').play().catch(()=>{}); if(mode==='work'){await saveSession(); if(sessions>=4){document.getElementById('long-break-modal').style.display='flex';} else initBreak(5);} else initWork(); fetchRanking();}
function initWork(){mode='work';duration=1500;timeLeft=duration;if(statusLabel.textContent!=='READY')sessions=sessions>=4?1:sessions+1;statusLabel.textContent='FOCUS';updateUI();}
function initBreak(m){mode='break';duration=m*60;timeLeft=duration;statusLabel.textContent='BREAK';updateUI();}
function setLongBreak(m){document.getElementById('long-break-modal').style.display='none';sessions=4;initBreak(m);} window.setLongBreak=setLongBreak;

onAuthStateChanged(auth, async user=>{currentUser=user; if(!user){authModal.style.display='flex'; syncStatus.textContent='ログインしてください'; return;} authModal.style.display='none'; syncStatus.textContent='ログイン中'; const uref=doc(db,'users',user.uid); const usnap=await getDoc(uref); if(!usnap.exists()) await setDoc(uref,{displayName:user.displayName||'User',photoURL:user.photoURL||'',createdAt:serverTimestamp()}); userNameInput.value=user.displayName||''; iconInput.value=user.photoURL||''; fetchRanking();});

document.getElementById('email-login-btn').onclick=()=>signInWithEmailAndPassword(auth,email.value,password.value).catch(e=>authMsg.textContent=e.message);
document.getElementById('email-signup-btn').onclick=()=>createUserWithEmailAndPassword(auth,email.value,password.value).catch(e=>authMsg.textContent=e.message);
document.getElementById('google-login-btn').onclick=()=>signInWithPopup(auth,provider).catch(e=>authMsg.textContent=e.message);
document.getElementById('logout-btn').onclick=()=>signOut(auth);
document.getElementById('save-profile-btn').onclick=async()=>{if(!currentUser)return; await updateProfile(currentUser,{displayName:userNameInput.value.trim(),photoURL:iconInput.value.trim()||null}); await setDoc(doc(db,'users',currentUser.uid),{displayName:currentUser.displayName,photoURL:currentUser.photoURL||''},{merge:true}); syncStatus.textContent='プロフィール保存完了'; fetchRanking();};
updateUI();
</script>
</body>
</html>
