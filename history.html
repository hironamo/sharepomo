<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>全体履歴</title><style>body{background:#0f172a;color:#fff;font-family:sans-serif;padding:20px}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #334155;padding:8px;text-align:left}button{background:#38bdf8;border:none;padding:6px 10px;border-radius:8px}</style></head><body>
<a href="index.html" style="color:#38bdf8">← タイマーに戻る</a><h2>作業履歴（全員公開）</h2><p id="meta"></p><table><thead><tr><th>ユーザー</th><th>開始</th><th>終了</th><th>ポモ</th><th>操作</th></tr></thead><tbody id="rows"></tbody></table>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, query, orderBy, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyCZh4ME9QimEx62f7SLc4F3lyorTzml_hY",authDomain:"sharetimer-fd215.firebaseapp.com",projectId:"sharetimer-fd215",storageBucket:"sharetimer-fd215.firebasestorage.app",messagingSenderId:"862201995112",appId:"1:862201995112:web:2b1b8d6a5cb74eb5d440dd",measurementId:"G-2DKH6Y8R4C"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app); let uid=null;
async function render(){const tbody=document.getElementById('rows'); tbody.innerHTML=''; const snap=await getDocs(query(collection(db,'sessions'),orderBy('startAt','desc'))); let total=0; snap.forEach(s=>{const d=s.data(); total+=d.pomos||1; const canEdit=uid&&uid===d.userId; const tr=document.createElement('tr'); tr.innerHTML=`<td>${d.displayName||'Unknown'}</td><td>${new Date(d.startAt).toLocaleString()}</td><td>${new Date(d.endAt).toLocaleString()}</td><td>${d.pomos||1}</td><td>${canEdit?`<button data-id='${s.id}'>削除</button>`:'-'}</td>`; tbody.appendChild(tr);}); document.getElementById('meta').textContent=`合計 ${total} ポモ`; tbody.querySelectorAll('button').forEach(btn=>btn.onclick=async()=>{await deleteDoc(doc(db,'sessions',btn.dataset.id)); render();});}
onAuthStateChanged(auth,user=>{uid=user?.uid||null; render();});
</script>
</body></html>
