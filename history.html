<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>My Focus History</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        #calendar { max-width: 900px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; }
        .fc-daygrid-day-number { color: #38bdf8; }
        .pomo-event { background: #38bdf8 !important; border: none !important; color: #000 !important; font-weight: bold; text-align: center; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #38bdf8; text-decoration: none; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← タイマーに戻る</a>
    <h2 id="user-title">Loading History...</h2>
    <div id="calendar"></div>

   <script>
    const GAS_URL = "https://script.google.com/a/macros/dc.tohoku.ac.jp/s/AKfycbwF0_1CpTnfL8StHq8nE_6Oq8r_YgV6v8mouVayLm87i_Abz5Z5OfJTIL9jetfgJ9HV/exec"; // ★必ず自分のものに書き換え
    const myName = localStorage.getItem('pomo_name') || "Guest";
    document.getElementById('user-title').textContent = `${myName} の作業履歴`;

    function loadCalendar() {
        // GASへ履歴をリクエスト
        const script = document.createElement('script');
        // ランダムなtを付けてキャッシュを回避し、action=getUserHistoryを送る
        script.src = `${GAS_URL}?action=getUserHistory&name=${encodeURIComponent(myName)}&callback=drawCalendar&t=${Date.now()}`;
        document.body.appendChild(script);
    }

    // GASからのレスポンスを受け取ってから実行される関数
    window.drawCalendar = function(historyData) {
        const calendarEl = document.getElementById('calendar');
        const events = Object.keys(historyData).map(date => ({
            title: `${historyData[date]} ポモ`,
            start: date,
            allDay: true
        }));

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ja',
            events: events,
            eventDidMount: function(info) {
                // 背景色などの微調整
                info.el.style.backgroundColor = '#38bdf8';
                info.el.style.color = '#000';
                info.el.style.border = 'none';
                info.el.style.borderRadius = '4px';
            }
        });
        calendar.render();
    };

    // ページ読み込み時に開始
    window.onload = loadCalendar;
</script>
</body>
</html>
