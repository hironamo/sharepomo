<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>みんなでポモ - Focus Connect Pro</title>
    <style>
        :root {
            --bg-work: #0f172a; --bg-break: #064e3b;
            --accent: #38bdf8; --text: #f8fafc; --nav-bg: rgba(0,0,0,0.6);
        }
        body {
            margin: 0; display: flex; flex-direction: column; height: 100vh; 
            background-color: var(--bg-work); color: var(--text);
            font-family: -apple-system, sans-serif; transition: background-color 0.8s; 
            overflow: hidden; background-size: cover; background-position: center; background-attachment: fixed;
        }
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: var(--nav-bg); backdrop-filter: blur(10px);
            z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .view { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 20px; text-align: center; }
        .card { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 30px; border-radius: 12px; width: 100%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1);}
        input { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border-radius: 6px; border: none; font-size: 1.1rem; text-align: center;}
        .btn { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem;}
        .btn-main { background: var(--accent); color: black; }
        .btn-sub { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); }
        
        /* Timer UI (Mainと共通) */
        .status-label { letter-spacing: 0.3rem; opacity: 0.8; margin-bottom: 10px; text-transform: uppercase; font-size: 1.2rem; font-weight: bold;}
        .timer-display { font-size: clamp(4rem, 15vw, 10rem); font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; margin: 20px 0; }
        .room-badge { background: var(--accent); color: black; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-bottom: 20px;}
        .controls { display: flex; gap: 1rem; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.2); }
        .dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: bold;">みんなでポモ</div>
        <button onclick="location.href='index.html'" style="background:none; border:none; color:white; cursor:pointer;">戻る</button>
    </nav>

    <div id="setup-view" class="view">
        <div class="card">
            <h2>ルーム選択</h2>
            <button class="btn btn-main" onclick="showInput('open')">部屋を開く (リーダー)</button>
            <button class="btn btn-sub" onclick="showInput('join')">部屋に入る</button>
            
            <div id="input-area" style="display:none; margin-top:20px;">
                <input type="number" id="room-code" placeholder="3桁の合言葉" maxlength="3" oninput="if(this.value.length > 3) this.value = this.value.slice(0, 3);">
                <button id="action-btn" class="btn btn-main" onclick="processRoom()"></button>
            </div>
        </div>
    </div>

    <div id="timer-view" class="view" style="display:none;">
        <div class="room-badge">合言葉: <span id="display-code"></span> <span id="leader-tag" style="margin-left:10px; opacity:0.7;"></span></div>
        <div class="status-label" id="status-label">READY</div>
        <div style="display:flex; gap:10px; margin-bottom:10px;" id="dots-area">
            <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="timer-display" id="timer-display">25:00</div>
        
        <div class="controls" id="leader-controls" style="display:none;">
            <button class="btn btn-sub" onclick="updateRoomState('reset')">Reset</button>
            <button class="btn btn-main" id="start-btn" onclick="updateRoomState('toggle')" style="min-width:120px;">START</button>
        </div>
        <div id="member-notice" style="opacity:0.6; font-size:0.9rem;">リーダーの操作を待っています...</div>
        
        <button onclick="leaveRoom()" style="margin-top:40px; background:none; border:none; color:#ff6b6b; cursor:pointer; font-size:0.8rem;">部屋を退出する</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // --- index.htmlと同じ設定を貼り付けてください ---
        const firebaseConfig = {
            apiKey: "AIzaSyCZh4ME9QimEx62f7SLc4F3lyorTzml_hY",
            authDomain: "sharetimer-fd215.firebaseapp.com",
            projectId: "sharetimer-fd215",
            storageBucket: "sharetimer-fd215.firebasestorage.app",
            messagingSenderId: "862201995112",
            appId: "1:862201995112:web:2b1b8d6a5cb74eb5d440dd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let userData = {};
        let currentRoomId = null;
        let isLeader = false;
        let unsubRoom = null;
        let localTimerId = null;
        let alarmAudio = new Audio();

        // ログイン状態確認
        onAuthStateChanged(auth, async (user) => {
            if (!user) { location.href = 'index.html'; return; }
            currentUser = user;
            const snap = await getDoc(doc(db, "users", user.uid));
            if(snap.exists()) userData = snap.data();
        });

        window.showInput = (mode) => {
            document.getElementById('input-area').style.display = 'block';
            document.getElementById('action-btn').innerText = mode === 'open' ? '部屋を作成' : '入室する';
            window.currentMode = mode;
        };

        window.processRoom = async () => {
            const code = document.getElementById('room-code').value;
            if(code.length !== 3) return alert("3桁の数字を入力してください");

            currentRoomId = code;
            if(window.currentMode === 'open') {
                isLeader = true;
                await setDoc(doc(db, "rooms", code), {
                    leaderUid: currentUser.uid,
                    status: 'idle',
                    mode: 'work',
                    sessions: 1,
                    timeLeft: 25 * 60,
                    duration: 25 * 60,
                    startTime: null,
                    settings: {
                        bgType: userData.bgType || 'color',
                        bgImageUrl: userData.bgImageUrl || null,
                        bgWork: userData.bgWork || '#0f172a',
                        bgBreak: userData.bgBreak || '#064e3b',
                        alarmUrl: userData.alarmUrl || null
                    }
                });
            } else {
                const snap = await getDoc(doc(db, "rooms", code));
                if(!snap.exists()) return alert("部屋が見つかりません");
                isLeader = false;
            }
            startSync();
        };

        function startSync() {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('timer-view').style.display = 'flex';
            document.getElementById('display-code').innerText = currentRoomId;
            document.getElementById('leader-tag').innerText = isLeader ? "(リーダー)" : "";
            document.getElementById('leader-controls').style.display = isLeader ? 'flex' : 'none';
            document.getElementById('member-notice').style.display = isLeader ? 'none' : 'block';

            unsubRoom = onSnapshot(doc(db, "rooms", currentRoomId), (snap) => {
                if(!snap.exists()) {
                    alert("部屋が解散されました");
                    location.reload();
                    return;
                }
                renderRoom(snap.data());
            });
        }

        function renderRoom(data) {
            // 背景とアラームの同期
            const s = data.settings;
            if(s.bgType === 'image' && s.bgImageUrl) {
                document.body.style.backgroundImage = `url(${s.bgImageUrl})`;
            } else {
                document.body.style.backgroundImage = 'none';
                document.body.style.backgroundColor = data.mode === 'work' ? s.bgWork : s.bgBreak;
            }
            if(s.alarmUrl) alarmAudio.src = s.alarmUrl;

            // タイマー表示
            document.getElementById('status-label').innerText = data.mode.toUpperCase();
            
            // セット数ドット
            const dots = document.getElementById('dots-area').children;
            for(let i=0; i<4; i++) dots[i].className = i < data.sessions ? "dot active" : "dot";

            // リアルタイム計算
            if(localTimerId) clearInterval(localTimerId);
            
            if(data.status === 'running') {
                document.getElementById('start-btn').innerText = "PAUSE";
                localTimerId = setInterval(() => {
                    const now = Date.now();
                    const start = data.startTime.toDate().getTime();
                    const elapsed = Math.floor((now - start) / 1000);
                    const remain = Math.max(0, data.timeLeft - elapsed);
                    updateDisplay(remain);
                    if(remain <= 0 && isLeader) handleTimeUp(data);
                }, 500);
            } else {
                document.getElementById('start-btn').innerText = "START";
                updateDisplay(data.timeLeft);
            }
        }

        function updateDisplay(sec) {
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = (sec % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}:${s}`;
        }

        window.updateRoomState = async (action) => {
            if(!isLeader) return;
            const ref = doc(db, "rooms", currentRoomId);
            const snap = await getDoc(ref);
            const data = snap.data();

            if(action === 'toggle') {
                if(data.status === 'running') {
                    // 一時停止：経過時間を計算して保存
                    const elapsed = Math.floor((Date.now() - data.startTime.toDate().getTime()) / 1000);
                    await updateDoc(ref, { status: 'idle', timeLeft: data.timeLeft - elapsed, startTime: null });
                } else {
                    // 開始
                    await updateDoc(ref, { status: 'running', startTime: serverTimestamp() });
                }
            } else if(action === 'reset') {
                await updateDoc(ref, { status: 'idle', timeLeft: 25*60, mode: 'work', sessions: 1, startTime: null });
            }
        };

        async function handleTimeUp(data) {
            clearInterval(localTimerId);
            if(alarmAudio.src) alarmAudio.play();
            
            let nextMode = data.mode === 'work' ? 'break' : 'work';
            let nextSessions = data.mode === 'work' ? data.sessions : data.sessions + 1;
            if(nextSessions > 4) nextSessions = 1;
            let nextTime = nextMode === 'work' ? 25*60 : 5*60;

            await updateDoc(doc(db, "rooms", currentRoomId), {
                status: 'idle',
                mode: nextMode,
                sessions: nextSessions,
                timeLeft: nextTime,
                startTime: null
            });
        }

        window.leaveRoom = async () => {
            if(isLeader) {
                if(confirm("部屋を解散しますか？")) await deleteDoc(doc(db, "rooms", currentRoomId));
            }
            location.reload();
        };
    </script>
</body>
</html>
